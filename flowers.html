      { level:35,  perk:"+5 fetch energy",                 type:"energy",    nftOnly:false, value:5 },
      { level:40,  perk:"+15% XP per feed (25% total)",    type:"xp",        nftOnly:true,  value:0.15 },
      { level:50,  perk:"+5% extra fetch resource (15%)",  type:"bonus",     nftOnly:false, value:0.05 },
      { level:60,  perk:"+1 guaranteed non-Acorn/Moonfur", type:"guaranteed", nftOnly:true },
      { level:75,  perk:"+5 fetch energy",                 type:"energy",    nftOnly:false, value:5 },
      { level:85,  perk:"+25% XP per feed (50% total)",    type:"xp",        nftOnly:true,  value:0.25 },
      { level:100, perk:"+10% extra fetch resource (25%)", type:"bonus",     nftOnly:false, value:0.10 },
      { level:150, perk:"+25% extra Moonfur (50% total)",  type:"moonfur",   nftOnly:true,  value:0.25 },
      { level:200, perk:"2nd hard request",                type:"request",   nftOnly:true,  detail:"+300 energy, +300 XP per feed" },
    ];

    const PET_REQUEST_VALUES = { easy:{xp:20,energy:20}, medium:{xp:100,energy:100}, hard:{xp:300,energy:300} };

    // ── Pet calculator helpers ──
    function petRequestsAtLevel(level, isNft) {
      const r = ["easy","medium"];
      if (isNft || level >= 10) r.push("hard");
      if (isNft && level >= 30) r.push("medium");  // 2nd medium
      if (isNft && level >= 200) r.push("hard");    // 2nd hard
      return r;
    }

    function petEnergyFromRequests(level, isNft) {
      return petRequestsAtLevel(level, isNft).reduce((s, r) => s + PET_REQUEST_VALUES[r].energy, 0);
    }

    function petFetchEnergyBonus(level) {
      let b = 0;
      if (level >= 5)  b += 5;
      if (level >= 35) b += 5;
      if (level >= 75) b += 5;
      return b;
    }

    function petExtraResourceChance(level) {
      let c = 0;
      if (level >= 15)  c += 0.10;
      if (level >= 50)  c += 0.05;
      if (level >= 100) c += 0.10;
      return c;
    }

    function petXpBonusMultiplier(level, isNft) {
      let m = 0;
      if (level >= 27) m += 0.10;
      if (isNft && level >= 40) m += 0.15;
      if (isNft && level >= 85) m += 0.25;
      return m;
    }

    function petDailyCalc(pet, p2pPrices, feedMult, hasPetBowls) {
      const reqTypes = petRequestsAtLevel(pet.level, pet.isNft);
      const reqEnergy = reqTypes.reduce((s, r) => s + PET_REQUEST_VALUES[r].energy, 0);
      const fetchBonus = petFetchEnergyBonus(pet.level);
      const energyPerFeed = reqEnergy + fetchBonus;
      const dailyEnergy = energyPerFeed * feedMult;

      // XP per feed
      const reqXp = reqTypes.reduce((s, r) => s + PET_REQUEST_VALUES[r].xp + (hasPetBowls ? 10 : 0), 0);
      const xpMult = 1 + petXpBonusMultiplier(pet.level, pet.isNft);
      const dailyXp = reqXp * xpMult * feedMult;

      // Best resource
      const fetchData = PET_FETCH_DATA[pet.petType] || [];
      const unlocked = fetchData.filter(f => pet.level >= f.level);
      const extraChance = petExtraResourceChance(pet.level);

      let bestRes = null, bestSflPerEnergy = 0;
      for (const f of unlocked) {
        const price = p2pPrices[f.res] || 0;
        const sflPerE = price / f.energy;
        if (sflPerE > bestSflPerEnergy) {
          bestSflPerEnergy = sflPerE;
          bestRes = f;
        }
      }

      let dailySfl = 0, fetchesPerDay = 0;
      if (bestRes) {
        fetchesPerDay = dailyEnergy / bestRes.energy;
        dailySfl = fetchesPerDay * (p2pPrices[bestRes.res] || 0) * (1 + extraChance);
      }

      // Acorn bonus at Lv18+
      let acornBonus = 0;
      if (pet.level >= 18) {
        acornBonus = (p2pPrices["Acorn"] || 0) * feedMult;
        dailySfl += acornBonus;
      }

      // Guaranteed non-Acorn/Moonfur resource at Lv60+ (NFT only)
      let guaranteedBonus = 0;
      if (pet.isNft && pet.level >= 60) {
        const nonAcornRes = unlocked.filter(f => f.res !== "Acorn" && f.res !== "Moonfur");
        const bestNonAcornPrice = nonAcornRes.reduce((best, f) => Math.max(best, p2pPrices[f.res] || 0), 0);
        guaranteedBonus = bestNonAcornPrice * fetchesPerDay;
        dailySfl += guaranteedBonus;
      }

      return { reqTypes, reqEnergy, fetchBonus, energyPerFeed, dailyEnergy, reqXp, xpMult,
               dailyXp, bestRes, bestSflPerEnergy, extraChance, dailySfl, fetchesPerDay, acornBonus, guaranteedBonus, feedMult };
    }


    // XP to reach level L = 50 * L * (L - 1)  (each level costs 100 * currentLevel XP)
    function petCumulativeXp(level) { return 50 * level * (level - 1); }
    function petXpForLevel(level) { return 100 * level; } // XP needed to go FROM this level to next

    function petLevel(xp) {
      // Solve 50*L*(L-1) <= xp  =>  L = floor((1 + sqrt(1 + xp/12.5)) / 2)
      if (xp <= 0) return 1;
      const L = Math.floor((1 + Math.sqrt(1 + xp / 12.5)) / 2);
      // Clamp: verify and adjust
      if (petCumulativeXp(L + 1) <= xp) return L + 1;
      if (petCumulativeXp(L) > xp) return Math.max(1, L - 1);
      return Math.max(1, L);
    }

    async function renderPets(data) {
      const app = document.getElementById("app");
      const { farm } = data;

      let html = `<div class="header pixel-panel pixel-font">
        <h1>PET ADVISOR</h1>
        <div class="farm-id">Farm #${escHTML(FARM_ID)}</div>
      </div>`;

      html += `<div class="under-dev-banner pixel-font" style="background:linear-gradient(180deg,#3b1768,#2a1050);padding:8px 12px;border:3px solid #000;margin-bottom:16px;text-align:center;font-size:0.5625rem;color:var(--lily)">
        &#x26A0;&#xFE0F; UNDER DEVELOPMENT &#x26A0;&#xFE0F;
        <div style="margin-top:6px;font-size:0.5rem;color:var(--text-secondary);line-height:1.5">
          Pet fetch resource advisor. Prices from sfl.world P2P market.<br>
          Shows optimal fetch targets based on ${sflIcon()}/energy efficiency.
        </div>
      </div>`;

      html += `<div id="pets-content"><div class="loading-screen pixel-font" style="padding:20px"><div class="loading-text">Loading prices...</div></div></div>`;
      app.innerHTML = html;

      // Fetch P2P prices
      let p2pPrices = {};
      try {
        const resp = await fetch(`/api/proxy?url=${encodeURIComponent("https://sfl.world/api/v1/prices")}`);
        if (resp.ok) {
          const priceResp = await resp.json();
          const priceData = priceResp?.data?.p2p || priceResp?.p2p || {};
          for (const [k, v] of Object.entries(priceData)) p2pPrices[k] = parseFloat(v) || 0;
        }
      } catch {}

      // Detect pet boosts
      const hasVictoriasApron = (farm.wardrobe?.["Victoria's Apron"] > 0) || isWearableEquipped(farm, "Victoria's Apron");
      const hasPetBowls = findCollectible(farm, "Pet Bowls").length > 0;
      const feedMultiplier = hasVictoriasApron ? 1.5 : 1.0;

      // Parse pets from farm data
      const pets = [];
      const commonPets = farm.pets?.common || {};
      for (const [name, pet] of Object.entries(commonPets)) {
        const xp = pet.experience || 0;
        const level = petLevel(xp);
        const energy = pet.energy || 0;
        const foods = pet.requests?.food || [];
        const species = PET_NAME_SPECIES[name] || null;
        pets.push({ name, petType: species, species, level, xp, energy, foods, isNft: false, nftId: null });
      }
      const nftPets = farm.pets?.nfts || {};
      for (const [id, pet] of Object.entries(nftPets)) {
        const xp = pet.experience || 0;
        const level = petLevel(xp);
        const energy = pet.energy || 0;
        const foods = pet.requests?.food || [];
        const petType = pet.traits?.type || "Unknown";
        pets.push({ name: petType, petType, species: petType, level, xp, energy, foods, isNft: true, nftId: id });
      }

      // Sort: NFT first, then common; within each group by level desc
      pets.sort((a, b) => {
        if (a.isNft !== b.isNft) return a.isNft ? -1 : 1;
        return b.level - a.level;
      });

      // Empty state
      if (pets.length === 0) {
        document.getElementById("pets-content").innerHTML = `
          <div class="pixel-panel" style="padding:24px;text-align:center;font-size:0.75rem;color:var(--text-secondary)">
            No pets found on this farm.<br><br>
            <a href="https://sfl.world/info/pets" target="_blank" style="color:var(--sunpetal)">Learn about pets &#x2192;</a>
          </div>`;
        return;
      }

      let content = '';

      // Summary bar
      const totalEnergy = pets.reduce((s, p) => s + p.energy, 0);
      const nftCount = pets.filter(p => p.isNft).length;
      const commonCount = pets.filter(p => !p.isNft).length;
      content += `<div class="summary-bar pixel-panel">
        <div class="summary-stat">
          <div class="label pixel-font">TOTAL PETS</div>
          <div class="value">${pets.length}</div>
        </div>
        <div class="summary-stat">
          <div class="label pixel-font">COMMON</div>
          <div class="value">${commonCount}</div>
        </div>
        <div class="summary-stat">
          <div class="label pixel-font">NFT</div>
          <div class="value" style="color:var(--lily)">${nftCount}</div>
        </div>
        <div class="summary-stat">
          <div class="label pixel-font">TOTAL ENERGY</div>
          <div class="value time">${totalEnergy.toLocaleString()} &#x26A1;</div>
        </div>
      </div>`;

      // ── NFT Pets Collection ──
      const ownedNftBreeds = {};
      for (const [id, pet] of Object.entries(nftPets)) {
        const breed = pet.traits?.type || "Unknown";
        if (NFT_BREED_TYPES.includes(breed)) {
          const xp = pet.experience || 0;
          ownedNftBreeds[breed] = { id, level: petLevel(xp), xp, energy: pet.energy || 0 };
        }
      }
      const ownedBreedCount = Object.keys(ownedNftBreeds).length;

      content += `<div class="pixel-panel" style="padding:12px 14px;margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px">
          <span class="pixel-font" style="font-size:0.6875rem;color:var(--lily);font-weight:bold">NFT PETS COLLECTION</span>
          <span class="pixel-font" style="font-size:0.625rem;color:var(--text-secondary)">${ownedBreedCount} / ${NFT_BREED_TYPES.length}</span>
        </div>
        <div class="nft-breed-grid">`;

      for (const breed of NFT_BREED_TYPES) {
        const owned = ownedNftBreeds[breed];
        const cls = owned ? "nft-breed-card owned" : "nft-breed-card missing";
        const badgeCls = owned ? "nft-breed-badge owned" : "nft-breed-badge missing";
        const badgeText = owned ? "OWNED" : "MISSING";
        const fetchData = PET_FETCH_DATA[breed] || [];

        // Find unique Lv25 resource and Moonfur
        const lv25 = fetchData.find(f => f.level === 25);
        const moonfur = fetchData.find(f => f.res === "Moonfur");

        // Build resource list showing what this breed can fetch
        const resLines = fetchData.map(f => {
          const lock = owned && owned.level >= f.level ? "\u2705" : "\uD83D\uDD12";
          let cls = "";
          if (f.level === 25) cls = " unique";
          else if (f.res === "Moonfur") cls = " moonfur";
          return `${lock} <span class="${cls}">${escHTML(f.res)}</span> (Lv${f.level}, ${f.energy}\u26A1)`;
        }).join(" &middot; ");

        content += `<div class="${cls}">
          <div class="nft-breed-header">
            <span class="nft-breed-name">${escHTML(breed)}</span>
            <span class="${badgeCls}">${badgeText}</span>
          </div>`;

        if (owned) {
          content += `<div class="nft-breed-stats">
            <span>Pet #${escHTML(owned.id)}</span>
            <span>Lv ${owned.level}</span>
            <span>${owned.energy.toLocaleString()} \u26A1</span>
          </div>`;
        } else {
          content += `<div class="nft-breed-stats"><span style="color:#e55">Not owned \u2014 buy from marketplace</span></div>`;
        }

        content += `<div class="nft-breed-resources">${resLines}</div>`;

        if (lv25) {
          const uniqueLabel = owned && owned.level >= 25 ? "\u2705 Unlocked" : `\uD83D\uDD12 Lv25 required`;
          content += `<div style="font-size:0.5625rem;color:var(--lily)">Unique: <b>${escHTML(lv25.res)}</b> \u2014 ${uniqueLabel}</div>`;
        }

        content += `</div>`;
      }

      content += `</div></div>`;

      // Collect all unique fetchable resources with prices
      const resMap = new Map();
      for (const entries of Object.values(PET_FETCH_DATA)) {
        for (const e of entries) {
          if (!resMap.has(e.res)) {
            const price = p2pPrices[e.res] || 0;
            const ratio = price > 0 ? price / e.energy : 0;
            resMap.set(e.res, { res: e.res, price, energy: e.energy, ratio });
          }
        }
      }
      const sortedRes = [...resMap.values()].sort((a, b) => b.ratio - a.ratio);

      // Resource market overview
      content += `<div class="pixel-panel" style="padding:12px 14px;margin-bottom:16px">
        <div style="font-size:0.6875rem;color:var(--sunpetal);margin-bottom:8px;font-weight:bold" class="pixel-font">RESOURCE MARKET</div>
        <table class="pet-resource-table">
          <tr><th>RESOURCE</th><th>${sflIcon("1em")} PRICE</th><th>&#x26A1; COST</th><th>${sflIcon("1em")}/&#x26A1;</th></tr>`;
      for (const r of sortedRes) {
        const priceStr = r.price > 0 ? r.price.toFixed(2) : "&#x2014;";
        const ratioStr = r.ratio > 0 ? r.ratio.toFixed(4) : "&#x2014;";
        const style = r.ratio > 0 ? "" : ' style="color:var(--text-dim)"';
        content += `<tr${style}><td>${escHTML(r.res)}</td><td>${priceStr}</td><td>${r.energy}</td><td>${ratioStr}</td></tr>`;
      }
      content += `</table></div>`;

      // Per-pet cards
      let grandTotalSfl = 0;
      let grandTotalCards = [];

      for (const pet of pets) {
        const fetchData = PET_FETCH_DATA[pet.petType] || [];
        const speciesLabel = pet.species ? ` (${escHTML(pet.species)})` : "";
        const nftBadge = pet.isNft ? ' <span style="color:var(--lily);font-size:0.5625rem;font-weight:normal">NFT</span>' : "";

        content += `<div class="pet-card pixel-panel">
          <div class="pet-header">
            <span class="pet-name">${escHTML(pet.name)}${speciesLabel}${nftBadge}</span>
            <span class="pet-level pixel-font">Lv ${pet.level} &#xB7; ${pet.energy.toLocaleString()} &#x26A1;</span>
          </div>`;

        if (fetchData.length > 0 && pet.energy > 0) {
          const unlocked = fetchData.filter(f => pet.level >= f.level);
          const locked = fetchData.filter(f => pet.level < f.level);

          // Calculate fetch counts, total SFL, and ratio for unlocked
          const withCalc = unlocked.map(f => {
            const price = p2pPrices[f.res] || 0;
            const fetches = Math.floor(pet.energy / f.energy);
            const totalSfl = fetches * price;
            const ratio = price > 0 ? price / f.energy : 0;
            return { ...f, price, ratio, fetches, totalSfl };
          }).sort((a, b) => b.totalSfl - a.totalSfl);

          // Best recommendation
          const best = withCalc.find(f => f.totalSfl > 0);
          if (best) {
            grandTotalSfl += best.totalSfl;
            grandTotalCards.push({ name: pet.name, res: best.res, fetches: best.fetches, totalSfl: best.totalSfl });
            content += `<div style="background:rgba(48,209,88,0.12);border:2px solid var(--green);padding:8px 10px;margin-bottom:6px;font-size:0.6875rem;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span style="color:var(--green);font-weight:bold">&#x2192;</span>
              <span>Fetch <b>${escHTML(best.res)}</b> &#xD7;${best.fetches}</span>
              <span style="color:var(--green);font-weight:bold">= ${best.totalSfl.toFixed(2)} ${sflIcon("0.85em")}</span>
              <span style="color:var(--text-dim);font-size:0.5625rem">(${best.energy} &#x26A1; each)</span>
            </div>`;
          }

          content += `<div class="pet-section-title pixel-font">ALL FETCHES</div>`;

          for (let i = 0; i < withCalc.length; i++) {
            const f = withCalc[i];
            const isBest = i === 0 && f.totalSfl > 0;
            const cls = isBest ? "pet-fetch-row pet-best" : "pet-fetch-row";
            const star = isBest ? "&#x2605; " : "";
            const priceStr = f.price > 0 ? `${f.price.toFixed(2)} ${sflIcon("0.85em")}` : "&#x2014;";
            const fetchStr = f.fetches > 0 ? `&#xD7;${f.fetches}` : "&#xD7;0";
            const totalStr = f.totalSfl > 0 ? `<b style="color:var(--green)">${f.totalSfl.toFixed(2)}</b>` : "&#x2014;";
            content += `<div class="${cls}">
              <span>${star}${escHTML(f.res)}</span>
              <span>${priceStr}</span>
              <span>${f.energy} &#x26A1;</span>
              <span>${fetchStr}</span>
              <span>${totalStr}</span>
            </div>`;
          }

          for (const f of locked) {
            content += `<div class="pet-fetch-row pet-locked">
              <span>&#x1F512; ${escHTML(f.res)}</span>
              <span>(Lv ${f.level})</span>
            </div>`;
          }
        } else if (fetchData.length > 0 && pet.energy === 0) {
          content += `<div style="padding:8px;color:var(--text-dim);font-size:0.6875rem">No energy &#x2014; pet needs to recharge</div>`;
        } else {
          content += `<div style="padding:8px;color:var(--text-dim);font-size:0.6875rem">Unknown pet type &#x2014; no fetch data available</div>`;
        }

        // Food requests
        if (pet.foods.length > 0) {
          content += `<div class="pet-section-title pixel-font">FOOD REQUESTS</div>`;
          content += `<div class="pet-food-list">${pet.foods.map(f => escHTML(f)).join(" &#xB7; ")}</div>`;
        }

        // ── SFL/DAY + XP + PERKS ──
        const calc = petDailyCalc(pet, p2pPrices, feedMultiplier, hasPetBowls);

        // Active boosts line
        {
          const boosts = [];
          if (hasVictoriasApron) boosts.push("Victoria's Apron (1.5\u00d7 feeds)");
          if (hasPetBowls) boosts.push("Pet Bowls (+10 XP/request)");
          if (boosts.length > 0) {
            content += `<div class="pet-boosts">\uD83C\uDFAF ${boosts.join(" \u00b7 ")}</div>`;
          }
        }

        // SFL/day summary
        if (calc.dailySfl > 0 && calc.bestRes) {
          const fetchCount = (calc.dailyEnergy / calc.bestRes.energy).toFixed(1);
          const extraPct = Math.round(calc.extraChance * 100);
          content += `<div class="pet-sfl-day">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px">
              <span>\u{1F4C8} <b>${calc.dailySfl.toFixed(2)}</b> ${sflIcon("0.85em")}/day</span>
              <span style="font-size:0.5625rem;color:var(--text-dim)">fetch ${escHTML(calc.bestRes.res)}</span>
            </div>
            <div class="pet-sfl-breakdown">
              ${calc.energyPerFeed}\u26A1/feed \u00d7 ${calc.feedMult} feeds/day = ${Math.round(calc.dailyEnergy)}\u26A1/day
              \u2192 ${fetchCount} fetches${extraPct > 0 ? ` (+${extraPct}% extra)` : ""}${calc.acornBonus > 0 ? ` + ${calc.acornBonus.toFixed(2)} acorn bonus` : ""}${calc.guaranteedBonus > 0 ? ` + ${calc.guaranteedBonus.toFixed(2)} guaranteed` : ""}
            </div>
          </div>`;
        }

        // XP progress
        {
          const currentXp = pet.xp;
          const currentLevelXp = petCumulativeXp(pet.level);
          const nextLevelXp = petCumulativeXp(pet.level + 1);
          const xpInLevel = currentXp - currentLevelXp;
          const xpNeeded = nextLevelXp - currentLevelXp;
          const pct = xpNeeded > 0 ? Math.min(100, Math.round(xpInLevel / xpNeeded * 100)) : 100;

          // Find next perk level
          const nextPerk = PET_LEVEL_PERKS.find(p => p.level > pet.level && (!p.nftOnly || pet.isNft) && (!p.commonOnly || !pet.isNft));
          let daysToNextPerk = "";
          if (nextPerk && calc.dailyXp > 0) {
            const xpToReach = petCumulativeXp(nextPerk.level) - currentXp;
            if (xpToReach > 0) {
              const days = Math.ceil(xpToReach / calc.dailyXp);
              daysToNextPerk = ` \u2192 Lv ${nextPerk.level} (${nextPerk.perk}) in ~${days}d`;
            }
          }

          content += `<div class="pet-xp-section">
            \uD83D\uDCCA Lv ${pet.level} \u2014 ${xpInLevel.toLocaleString()} / ${xpNeeded.toLocaleString()} XP (${pct}%)
            <span style="font-size:0.5625rem;color:var(--text-dim)">~${Math.round(calc.dailyXp)} XP/day${daysToNextPerk}</span>
            <div class="pet-xp-bar"><div class="pet-xp-fill" style="width:${pct}%"></div></div>
          </div>`;
        }

        // Level perks (collapsed)
        {
          const perkId = `perks-${pet.isNft ? 'nft-' + pet.nftId : pet.name}`.replace(/[^a-zA-Z0-9-]/g, '_');
          content += `<div class="pet-perks-wrap">
            <div class="pet-section-title pixel-font" style="cursor:pointer" onclick="document.getElementById('${perkId}').style.display=document.getElementById('${perkId}').style.display==='none'?'block':'none'">
              LEVEL PERKS \u25BC
            </div>
            <div id="${perkId}" style="display:none">`;

          const fetchData = PET_FETCH_DATA[pet.petType] || [];
          for (const perk of PET_LEVEL_PERKS) {
            // Determine status
            const isNa = (perk.nftOnly && !pet.isNft) || (perk.commonOnly && pet.isNft);
            const isUnlocked = pet.level >= perk.level;
            const isNext = !isNa && !isUnlocked && perk === PET_LEVEL_PERKS.find(p => p.level > pet.level && !((p.nftOnly && !pet.isNft) || (p.commonOnly && pet.isNft)));

            let cls = "pet-perk-row";
            let icon = "";
            if (isNa) { cls += " na"; icon = "\u26D4"; }
            else if (isUnlocked) { cls += " unlocked"; icon = "\u2705"; }
            else if (isNext) { cls += " next"; icon = "\u{1F538}"; }
            else { cls += " upcoming"; icon = "\uD83D\uDD12"; }

            // Perk description — use species-specific resource name where applicable
            let desc = perk.perk;
            if (perk.type === "resource" && fetchData.length > 0) {
              const match = fetchData.find(f => f.level === perk.level);
              if (match) desc = `${match.res} fetch (${match.energy}\u26A1)`;
            }

            // Delta estimate for upcoming perks
            let delta = "";
            if (!isNa && !isUnlocked && calc.bestRes) {
              const bestPrice = p2pPrices[calc.bestRes.res] || 0;
              if (perk.type === "energy" && perk.value) {
                const d = perk.value / calc.bestRes.energy * bestPrice * (1 + calc.extraChance) * feedMultiplier;
                if (d > 0.001) delta = `<span class="pet-perk-delta" style="color:var(--green)">+${d.toFixed(3)} SFL/d</span>`;
              } else if (perk.type === "bonus" && perk.value) {
                const d = calc.fetchesPerDay * bestPrice * perk.value;
                if (d > 0.001) delta = `<span class="pet-perk-delta" style="color:var(--green)">+${d.toFixed(3)} SFL/d</span>`;
              } else if (perk.type === "acorn") {
                const d = (p2pPrices["Acorn"] || 0) * feedMultiplier;
                if (d > 0.001) delta = `<span class="pet-perk-delta" style="color:var(--green)">+${d.toFixed(3)} SFL/d</span>`;
              } else if (perk.type === "request") {
                // New request adds energy
                const addE = perk.detail?.includes("300") ? 300 : 100;
                const d = addE * feedMultiplier / calc.bestRes.energy * bestPrice * (1 + calc.extraChance);
                if (d > 0.001) delta = `<span class="pet-perk-delta" style="color:var(--green)">+${d.toFixed(3)} SFL/d</span>`;
              } else if (perk.type === "resource") {
                const match = fetchData.find(f => f.level === perk.level);
                if (match) {
                  const newPrice = p2pPrices[match.res] || 0;
                  const newRatio = newPrice / match.energy;
                  if (newRatio > calc.bestSflPerEnergy) {
                    delta = `<span class="pet-perk-delta" style="color:var(--sunpetal)">better SFL/\u26A1!</span>`;
                  }
                }
              } else if (perk.type === "xp") {
                delta = `<span class="pet-perk-delta" style="color:var(--lily)">XP boost</span>`;
              } else if (perk.type === "guaranteed") {
                // +1 guaranteed non-Acorn/Moonfur resource per fetch
                const unlockedRes = fetchData.filter(f => pet.level >= f.level);
                const nonAcornRes = unlockedRes.filter(f => f.res !== "Acorn" && f.res !== "Moonfur");
                const bestNonAcorn = nonAcornRes.reduce((best, f) => {
                  const p = p2pPrices[f.res] || 0;
                  return p > (best?.price || 0) ? { res: f.res, price: p } : best;
                }, null);
                if (bestNonAcorn && bestNonAcorn.price > 0) {
                  const d = bestNonAcorn.price * calc.fetchesPerDay;
                  if (d > 0.001) delta = `<span class="pet-perk-delta" style="color:var(--green)">+${d.toFixed(3)} SFL/d</span>`;
                }
              } else if (perk.type === "moonfur" && perk.value) {
                const moonfurPrice = p2pPrices["Moonfur"] || 0;
                const moonfurData = fetchData.find(f => f.res === "Moonfur");
                if (moonfurData && moonfurPrice > 0) {
                  const moonfurFetches = calc.dailyEnergy / moonfurData.energy;
                  const d = moonfurFetches * moonfurPrice * perk.value;
                  if (d > 0.001) delta = `<span class="pet-perk-delta" style="color:var(--green)">+${d.toFixed(3)} SFL/d (Moonfur)</span>`;
                }
              }
            }

            // Days to reach (for upcoming perks)
            let daysStr = "";
            if (!isNa && !isUnlocked && calc.dailyXp > 0) {
              const xpToReach = petCumulativeXp(perk.level) - pet.xp;
              if (xpToReach > 0) {
                const days = Math.ceil(xpToReach / calc.dailyXp);
                daysStr = `<span style="font-size:0.5rem;color:var(--text-dim);margin-left:4px">~${days}d</span>`;
              }
            }

            const naLabel = isNa ? (perk.nftOnly ? " [NFT only]" : " [Common only]") : "";
            const nextLabel = isNext ? " \u2190 NEXT" : "";

            content += `<div class="${cls}">
              <span>${icon} Lv ${perk.level}</span>
              <span style="flex:1">${desc}${naLabel}${nextLabel}</span>
              ${daysStr}${delta}
            </div>`;
          }

          content += `</div></div>`;
        }

        content += `</div>`;
      }

      // Calculate total daily SFL across all pets
      let totalDailySfl = 0;
      const dailyCards = [];
      for (const pet of pets) {
        const calc = petDailyCalc(pet, p2pPrices, feedMultiplier, hasPetBowls);
        if (calc.dailySfl > 0) {
          totalDailySfl += calc.dailySfl;
          dailyCards.push({ name: pet.name, sfl: calc.dailySfl, res: calc.bestRes?.res || "?" });
        }
      }

      // Grand total summary (if any pet has earnings)
      if (grandTotalSfl > 0) {
        let totalHtml = `<div class="pixel-panel" style="padding:12px 14px;margin-bottom:16px;border-color:var(--green)">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px">
            <span class="pixel-font" style="font-size:0.6875rem;color:var(--green);font-weight:bold">OPTIMAL EARNINGS</span>
            <span style="font-size:1rem;font-weight:bold;color:var(--green)">${grandTotalSfl.toFixed(2)} ${sflIcon("1em")} per feed</span>
          </div>`;

        if (totalDailySfl > 0) {
          totalHtml += `<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px">
            <span class="pixel-font" style="font-size:0.6875rem;color:var(--sunpetal);font-weight:bold">DAILY PET INCOME</span>
            <span style="font-size:1rem;font-weight:bold;color:var(--sunpetal)">${totalDailySfl.toFixed(2)} ${sflIcon("1em")}/day</span>
          </div>`;
        }

        totalHtml += `<div style="font-size:0.6875rem;color:var(--text-secondary);line-height:1.6">`;
        for (const c of grandTotalCards) {
          const daily = dailyCards.find(d => d.name === c.name);
          const dailyStr = daily ? ` (${daily.sfl.toFixed(2)}/day)` : "";
          totalHtml += `${escHTML(c.name)}: ${escHTML(c.res)} &#xD7;${c.fetches} = ${c.totalSfl.toFixed(2)} ${sflIcon("0.85em")}${dailyStr}<br>`;
        }
        totalHtml += `</div></div>`;
        // Insert between summary bar and resource market
        const marketAnchor = '<div class="pixel-panel" style="padding:12px 14px;margin-bottom:16px">';
        const mIdx = content.indexOf(marketAnchor);
        if (mIdx >= 0) {
          content = content.substring(0, mIdx) + totalHtml + content.substring(mIdx);
        }
      }

      document.getElementById("pets-content").innerHTML = content;
    }

    function refresh() {
      cachedFarmData = null;
      main();
    }

    async function main() {
      const cfg = getConfig();
      const page = getPage();

      FARM_ID = cfg.farm;
      LIMIT = cfg.limit;
      FLOWER_BEDS = 4;

      renderNavBar(page);
      renderDonate();

      if (!FARM_ID) {
        renderConfigBar("hub");
        renderHub(null);
        return;
      }

      renderConfigBar(page);

      const app = document.getElementById("app");

      if (!cachedFarmData) {
        app.innerHTML = `<div class="loading-screen pixel-font">
          <div class="loading-flower">🌻</div>
          <div class="loading-text">Loading farm data...</div>
        </div>`;
      }

      try {
        if (!cachedFarmData) {
          cachedFarmData = await fetchFarmData();
        }
        const data = cachedFarmData;

        // Auto-detect bed/trap counts and apply boosts
        FLOWER_BEDS = Math.max(1, Object.keys(data.flowerBeds).length);
        applyFlowerBoosts(data.flowerMultiplier);


    // ═══════════════════════════════════════
    //  DIFF PAGE (farm 155498 only)
    // ═══════════════════════════════════════

    function estimateItemSfl(itemName, p2pPrices, _visited, rates) {
      // Direct P2P price
      if (p2pPrices[itemName]) return p2pPrices[itemName];

      // Prevent infinite recursion
      const visited = _visited || new Set();
      if (visited.has(itemName)) return 0;
      visited.add(itemName);

      // Crafted ingredient (e.g., Cheese = 3 Milk)
      const craftedRecipe = CRAFTED_INGREDIENT_RECIPES[itemName];
      if (craftedRecipe) {
        let total = 0;
        for (const [ing, qty] of Object.entries(craftedRecipe)) {
          const ingPrice = estimateItemSfl(ing, p2pPrices, visited, rates);
          if (ingPrice <= 0) return 0;
          total += ingPrice * qty;
        }
        return total;
      }

      // Food recipe
      const foodRecipe = RECIPE_INGREDIENTS[itemName];
      if (foodRecipe) {
        let total = 0;
        for (const [ing, qty] of Object.entries(foodRecipe)) {
          const ingPrice = estimateItemSfl(ing, p2pPrices, visited, rates);
          if (ingPrice <= 0) return 0;
          total += ingPrice * qty;
        }
        return total;
      }

      // Barn Delight
      if (itemName === "Barn Delight") {
        const lemon = p2pPrices["Lemon"] || 0;
        const honey = p2pPrices["Honey"] || 0;
        if (lemon > 0 && honey > 0) return 5 * lemon + 3 * honey;
        return 0;
      }

      // Doll recipes
      if (typeof DOLL_RECIPES !== "undefined" && DOLL_RECIPES[itemName]) {
        const recipe = DOLL_RECIPES[itemName];
        if (recipe.length === 0) return 0;
        let total = 0;
        for (const { item, qty } of recipe) {
          const ingPrice = estimateItemSfl(item, p2pPrices, visited, rates);
          if (ingPrice <= 0) return 0;
          total += ingPrice * qty;
        }
        return total;
      }

      // Tool costs (coins + materials)
      if (typeof TOOL_COSTS !== "undefined" && TOOL_COSTS[itemName] && rates && rates.coinsPerSFL > 0) {
        const tool = TOOL_COSTS[itemName];
        let total = tool.coins / rates.coinsPerSFL;
        if (tool.materials) {
          for (const [mat, qty] of Object.entries(tool.materials)) {
            const matPrice = estimateItemSfl(mat, p2pPrices, visited, rates);
            total += matPrice * qty;
          }
        }
        return total;
      }

      // Seed costs (coins only) — SEED_COSTS keyed by crop name, items come as "X Seed" or "X Plant"
      if (typeof SEED_COSTS !== "undefined" && rates && rates.coinsPerSFL > 0) {
        const cropName = itemName.endsWith(" Seed") ? itemName.slice(0, -5) : itemName.endsWith(" Plant") ? itemName.slice(0, -6) : itemName;
        if (SEED_COSTS[cropName]) return SEED_COSTS[cropName] / rates.coinsPerSFL;
      }

      // Love Charm: 50 LC = 1 SFL
      if (itemName === "Love Charm") return 1 / 50;

      // Flower seed coin costs
      if (typeof FLOWER_SEED_COIN_COSTS !== "undefined" && FLOWER_SEED_COIN_COSTS[itemName] && rates && rates.coinsPerSFL > 0) {
        return FLOWER_SEED_COIN_COSTS[itemName] / rates.coinsPerSFL;
      }

      // Flowers → seed cost (via FLOWER_RECIPES; input flower not counted as it appears separately in diff)
      if (typeof FLOWER_RECIPES !== "undefined" && FLOWER_RECIPES[itemName]) {
        const seedName = FLOWER_RECIPES[itemName].seed;
        if (typeof FLOWER_SEED_COIN_COSTS !== "undefined" && FLOWER_SEED_COIN_COSTS[seedName] && rates && rates.coinsPerSFL > 0) {
          return FLOWER_SEED_COIN_COSTS[seedName] / rates.coinsPerSFL;
        }
      }

      // Treasure sell prices (coins → SFL, with boosts: Treasure Map +20%, Camel +30%)
      if (typeof TREASURE_SELL_PRICES !== "undefined" && TREASURE_SELL_PRICES[itemName] && rates && rates.coinsPerSFL > 0) {
        const tb = rates.treasureBoost || 1;
        return (TREASURE_SELL_PRICES[itemName] * tb) / rates.coinsPerSFL;
      }

      // Fish/food XP-based pricing (sflPerXP from bumpkin best cooking recipe)
      if (typeof ITEM_XP_VALUES !== "undefined" && ITEM_XP_VALUES[itemName] && rates && rates.sflPerXP > 0) {
        return ITEM_XP_VALUES[itemName] * rates.sflPerXP;
      }

      // Giant item coin sell prices
      if (typeof GIANT_ITEM_COIN_PRICES !== "undefined" && GIANT_ITEM_COIN_PRICES[itemName] && rates && rates.coinsPerSFL > 0) {
        return GIANT_ITEM_COIN_PRICES[itemName] / rates.coinsPerSFL;
      }

      // Omnifeed: costs 1 Gem
      if (itemName === "Omnifeed") {
        const gemsPerSFL = rates?.gemsPerSFL || 0;
        if (gemsPerSFL > 0) return 1 / gemsPerSFL;
      }

      // Crustaceans (pot + chum cost from CRUSTACEAN_RECIPES)
      if (typeof CRUSTACEAN_RECIPES !== "undefined" && CRUSTACEAN_RECIPES[itemName]) {
        const cr = CRUSTACEAN_RECIPES[itemName];
        const potPrice = estimateItemSfl(cr.pot, p2pPrices, visited, rates);
        let chumCost = 0;
        if (cr.chum && cr.qty > 0) {
          chumCost = estimateItemSfl(cr.chum, p2pPrices, visited, rates) * cr.qty;
          if (cr.alt) {
            const altParts = cr.alt.match(/^(.+?)\s*x(\d+)$/);
            if (altParts) {
              const altCost = estimateItemSfl(altParts[1], p2pPrices, visited, rates) * parseInt(altParts[2]);
              if (altCost > 0 && (chumCost <= 0 || altCost < chumCost)) chumCost = altCost;
            }
          }
        }
        if (potPrice > 0) return potPrice + chumCost;
      }

      // Mark: fixed 0.01 SFL (from treasury/faction shop)
      if (itemName === "Mark") return 0.01;

      // Acorn: opportunity cost = best pet resource SFL/energy ratio * 100 energy
      if (itemName === "Acorn" && typeof PET_FETCH_DATA !== "undefined") {
        let bestRatio = 0;
        for (const entries of Object.values(PET_FETCH_DATA)) {
          for (const e of entries) {
            if (e.res === "Acorn") continue;
            const p = p2pPrices[e.res] || 0;
            if (p > 0) bestRatio = Math.max(bestRatio, p / e.energy);
          }
        }
        if (bestRatio > 0) return bestRatio * 100;
      }

      // Fish Market recipes (season-dependent: Crab Stick, Fish Flake, Fish Stick, Fish Oil)
      if (typeof FISH_MARKET_RECIPES !== "undefined" && FISH_MARKET_RECIPES[itemName]) {
        const seasonRecipes = FISH_MARKET_RECIPES[itemName];
        const s = rates?.season || "";
        const recipe = seasonRecipes[s] || Object.values(seasonRecipes)[0];
        if (recipe) {
          let total = 0;
          for (const [ing, qty] of Object.entries(recipe)) {
            total += estimateItemSfl(ing, p2pPrices, visited, rates) * qty;
          }
          if (total > 0) return total;
        }
      }

      // Compost products (Sprout Mix, Fruitful Blend, Rapid Root, Earthworm, Grub, Red Wiggler)
      if (typeof COMPOST_RECIPES !== "undefined") {
        for (const [composter, data] of Object.entries(COMPOST_RECIPES)) {
          if (data.outputs[itemName] !== undefined) {
            const s = rates?.season || "";
            const inputs = data.inputs[s] || Object.values(data.inputs)[0];
            let batchCost = 0;
            for (const [ing, qty] of Object.entries(inputs)) {
              batchCost += estimateItemSfl(ing, p2pPrices, visited, rates) * qty;
            }
            const totalUnits = Object.values(data.outputs).reduce((sum, q) => sum + q, 0);
            if (batchCost > 0 && totalUnits > 0) return batchCost / totalUnits;
          }
        }
      }

      return 0;
    }

    // Returns { price, method, detail } explaining how the price was derived
    // Returns null for items with direct P2P prices (those are from API)
    function explainItemSfl(itemName, p2pPrices, rates) {
      const coinsPerSFL = rates?.coinsPerSFL || 0;
      const sflPerXP = rates?.sflPerXP || 0;
      const fNum = (v) => v < 0.001 ? v.toFixed(6) : v < 1 ? v.toFixed(4) : v.toFixed(2);

      // Skip items with direct P2P prices
      if (p2pPrices[itemName]) return null;

      // Oil (special: localStorage or farm data)
      if (itemName === "Oil") {
        const cached = parseFloat(localStorage.getItem("sfl_oil_price"));
        if (!isNaN(cached) && cached >= 0) {
          return { price: cached, method: "Power page", detail: `toolCostPerDay / boostedYieldPerDay = ${fNum(cached)} (cached from Power page with all NFT boosts)` };
        }
        return { price: 0, method: "Power page", detail: "Visit Power page first to compute Oil price with your boosts" };
      }

      // Crafted ingredient (Cheese = 3 Milk)
      if (typeof CRAFTED_INGREDIENT_RECIPES !== "undefined" && CRAFTED_INGREDIENT_RECIPES[itemName]) {
        const recipe = CRAFTED_INGREDIENT_RECIPES[itemName];
        let parts = [], total = 0;
        for (const [ing, qty] of Object.entries(recipe)) {
          const p = estimateItemSfl(ing, p2pPrices, null, rates);
          parts.push(`${qty}\u00d7 ${ing} (${fNum(p)})`);
          total += p * qty;
        }
        return { price: total, method: "Crafted recipe", detail: parts.join(" + ") + ` = ${fNum(total)}` };
      }

      // Food recipe (RECIPE_INGREDIENTS)
      if (typeof RECIPE_INGREDIENTS !== "undefined" && RECIPE_INGREDIENTS[itemName]) {
        const recipe = RECIPE_INGREDIENTS[itemName];
        let parts = [], total = 0;
        for (const [ing, qty] of Object.entries(recipe)) {
          const p = estimateItemSfl(ing, p2pPrices, null, rates);
          const src = p2pPrices[ing] ? "P2P" : "derived";
          parts.push(`${qty}\u00d7 ${ing} (${fNum(p)} ${src})`);
          total += p * qty;
        }
        return { price: total, method: "Cooking recipe", detail: parts.join(" + ") + ` = ${fNum(total)}` };
      }

      // Barn Delight
      if (itemName === "Barn Delight") {
        const lemon = p2pPrices["Lemon"] || 0;
        const honey = p2pPrices["Honey"] || 0;
        const total = 5 * lemon + 3 * honey;
        return { price: total, method: "Special recipe", detail: `5\u00d7 Lemon (${fNum(lemon)} P2P) + 3\u00d7 Honey (${fNum(honey)} P2P) = ${fNum(total)}` };
      }

      // Doll recipes
      if (typeof DOLL_RECIPES !== "undefined" && DOLL_RECIPES[itemName]) {
        const recipe = DOLL_RECIPES[itemName];
        if (recipe.length === 0) return { price: 0, method: "Doll", detail: "No recipe data" };
        let parts = [], total = 0;
        for (const { item, qty } of recipe) {
          const p = estimateItemSfl(item, p2pPrices, null, rates);
          const src = p2pPrices[item] ? "P2P" : "derived";
          parts.push(`${qty}\u00d7 ${item} (${fNum(p)} ${src})`);
          total += p * qty;
        }
        return { price: total, method: "Doll recipe", detail: parts.join(" + ") + ` = ${fNum(total)}` };
      }

      // Tool costs
      if (typeof TOOL_COSTS !== "undefined" && TOOL_COSTS[itemName] && coinsPerSFL > 0) {
        const tool = TOOL_COSTS[itemName];
        let coinPart = tool.coins / coinsPerSFL;
        let parts = [`${tool.coins}c / ${coinsPerSFL.toFixed(0)} c/SFL = ${fNum(coinPart)}`];
        let total = coinPart;
        if (tool.materials) {
          for (const [mat, qty] of Object.entries(tool.materials)) {
            const p = estimateItemSfl(mat, p2pPrices, null, rates);
            const src = p2pPrices[mat] ? "P2P" : "derived";
            parts.push(`${qty}\u00d7 ${mat} (${fNum(p)} ${src})`);
            total += p * qty;
          }
        }
        return { price: total, method: "Tool cost", detail: parts.join(" + ") + ` = ${fNum(total)}` };
      }

      // Seed costs (crop/fruit seeds, including "X Plant" like Banana Plant)
      if (typeof SEED_COSTS !== "undefined" && coinsPerSFL > 0) {
        const cropName = itemName.endsWith(" Seed") ? itemName.slice(0, -5) : itemName.endsWith(" Plant") ? itemName.slice(0, -6) : itemName;
        if (SEED_COSTS[cropName]) {
          const coins = SEED_COSTS[cropName];
          const price = coins / coinsPerSFL;
          const seedLabel = itemName.endsWith(" Plant") ? `${cropName} Plant` : `${cropName} Seed`;
          return { price, method: "Seed (coins)", detail: `${seedLabel}: ${coins}c / ${coinsPerSFL.toFixed(0)} c/SFL = ${fNum(price)}` };
        }
      }

      // Love Charm
      if (itemName === "Love Charm") {
        return { price: 1/50, method: "Fixed rate", detail: `50 Love Charm = 1 SFL \u2192 1 LC = ${fNum(1/50)}` };
      }

      // Flower seed coin costs
      if (typeof FLOWER_SEED_COIN_COSTS !== "undefined" && FLOWER_SEED_COIN_COSTS[itemName] && coinsPerSFL > 0) {
        const coins = FLOWER_SEED_COIN_COSTS[itemName];
        const price = coins / coinsPerSFL;
        return { price, method: "Flower seed (coins)", detail: `${itemName}: ${coins}c / ${coinsPerSFL.toFixed(0)} c/SFL = ${fNum(price)}` };
      }

      // Flowers -> seed cost
      if (typeof FLOWER_RECIPES !== "undefined" && FLOWER_RECIPES[itemName]) {
        const seedName = FLOWER_RECIPES[itemName].seed;
        if (typeof FLOWER_SEED_COIN_COSTS !== "undefined" && FLOWER_SEED_COIN_COSTS[seedName] && coinsPerSFL > 0) {
          const coins = FLOWER_SEED_COIN_COSTS[seedName];
          const price = coins / coinsPerSFL;
          return { price, method: "Flower (seed cost)", detail: `${itemName} \u2192 ${seedName} (${coins}c) / ${coinsPerSFL.toFixed(0)} c/SFL = ${fNum(price)}` };
        }
      }

      // Treasure sell prices (with boosts)
      if (typeof TREASURE_SELL_PRICES !== "undefined" && TREASURE_SELL_PRICES[itemName] && coinsPerSFL > 0) {
        const baseCoins = TREASURE_SELL_PRICES[itemName];
        const tb = rates?.treasureBoost || 1;
        const boostedCoins = baseCoins * tb;
        const price = boostedCoins / coinsPerSFL;
        const boostNote = tb > 1 ? ` \u00d7${tb.toFixed(1)} boost` : "";
        return { price, method: "Treasure (sell price)", detail: `sell ${baseCoins}c${boostNote} = ${boostedCoins.toFixed(0)}c / ${coinsPerSFL.toFixed(0)} c/SFL = ${fNum(price)}` };
      }

      // Fish/food XP pricing
      if (typeof ITEM_XP_VALUES !== "undefined" && ITEM_XP_VALUES[itemName] && sflPerXP > 0) {
        const xp = ITEM_XP_VALUES[itemName];
        const price = xp * sflPerXP;
        return { price, method: "XP value", detail: `${xp} XP \u00d7 ${sflPerXP.toFixed(6)} SFL/XP = ${fNum(price)}` };
      }

      // Giant item coin prices
      if (typeof GIANT_ITEM_COIN_PRICES !== "undefined" && GIANT_ITEM_COIN_PRICES[itemName] && coinsPerSFL > 0) {
        const coins = GIANT_ITEM_COIN_PRICES[itemName];
        const price = coins / coinsPerSFL;
        return { price, method: "Giant (sell price)", detail: `sell ${coins}c / ${coinsPerSFL.toFixed(0)} c/SFL = ${fNum(price)}` };
      }

      // Omnifeed (1 Gem)
      if (itemName === "Omnifeed") {
        const gemsPerSFL = rates?.gemsPerSFL || 0;
        if (gemsPerSFL > 0) {
          const price = 1 / gemsPerSFL;
          return { price, method: "Gem cost", detail: `1 Gem / ${gemsPerSFL.toFixed(2)} Gems/SFL = ${fNum(price)}` };
        }
        return { price: 0, method: "Gem cost", detail: "1 Gem (exchange rate unknown)" };
      }

      // Crustaceans
      if (typeof CRUSTACEAN_RECIPES !== "undefined" && CRUSTACEAN_RECIPES[itemName]) {
        const cr = CRUSTACEAN_RECIPES[itemName];
        const potPrice = estimateItemSfl(cr.pot, p2pPrices, null, rates);
        let parts = [`${cr.pot} (${fNum(potPrice)})`];
        let chumCost = 0;
        if (cr.chum && cr.qty > 0) {
          const chumPrice = estimateItemSfl(cr.chum, p2pPrices, null, rates);
          chumCost = chumPrice * cr.qty;
          let chumDetail = `${cr.qty}\u00d7 ${cr.chum} (${fNum(chumPrice)})`;
          if (cr.alt) {
            const altParts = cr.alt.match(/^(.+?)\s*x(\d+)$/);
            if (altParts) {
              const altItemPrice = estimateItemSfl(altParts[1], p2pPrices, null, rates);
              const altCost = altItemPrice * parseInt(altParts[2]);
              if (altCost > 0 && (chumCost <= 0 || altCost < chumCost)) {
                chumCost = altCost;
                chumDetail = `${altParts[2]}\u00d7 ${altParts[1]} (${fNum(altItemPrice)}) [cheaper alt]`;
              }
            }
          }
          parts.push(chumDetail);
        }
        const total = potPrice + chumCost;
        return { price: total, method: "Crustacean (pot+chum)", detail: parts.join(" + ") + ` = ${fNum(total)}` };
      }

      // Mark
      if (itemName === "Mark") {
        return { price: 0.01, method: "Fixed rate", detail: "1 Mark = 0.01 SFL (faction shop rate)" };
      }

      // Acorn (pet energy opportunity cost)
      if (itemName === "Acorn" && typeof PET_FETCH_DATA !== "undefined") {
        let bestRatio = 0, bestRes = "";
        for (const entries of Object.values(PET_FETCH_DATA)) {
          for (const e of entries) {
            if (e.res === "Acorn") continue;
            const p = p2pPrices[e.res] || 0;
            if (p > 0 && p / e.energy > bestRatio) { bestRatio = p / e.energy; bestRes = e.res; }
          }
        }
        if (bestRatio > 0) {
          const price = bestRatio * 100;
          return { price, method: "Pet energy cost", detail: `100 energy \u00d7 best ratio ${bestRatio.toFixed(6)} SFL/\u26a1 (${bestRes}) = ${fNum(price)}` };
        }
        return { price: 0, method: "Pet energy cost", detail: "No pet resources with P2P prices" };
      }

      // Fish Market recipes (season-dependent)
      if (typeof FISH_MARKET_RECIPES !== "undefined" && FISH_MARKET_RECIPES[itemName]) {
        const seasonRecipes = FISH_MARKET_RECIPES[itemName];
        const s = rates?.season || "";
        const season = s || Object.keys(seasonRecipes)[0];
        const recipe = seasonRecipes[season] || Object.values(seasonRecipes)[0];
        if (recipe) {
          let parts = [], total = 0;
          for (const [ing, qty] of Object.entries(recipe)) {
            const p = estimateItemSfl(ing, p2pPrices, null, rates);
            const src = p2pPrices[ing] ? "P2P" : "derived";
            parts.push(`${qty}\u00d7 ${ing} (${fNum(p)} ${src})`);
            total += p * qty;
          }
          const seasonLabel = season.charAt(0).toUpperCase() + season.slice(1);
          return { price: total, method: `Fish Market (${seasonLabel})`, detail: parts.join(" + ") + ` = ${fNum(total)}` };
        }
      }

      // Compost products
      if (typeof COMPOST_RECIPES !== "undefined") {
        for (const [composter, data] of Object.entries(COMPOST_RECIPES)) {
          if (data.outputs[itemName] !== undefined) {
            const s = rates?.season || "";
            const season = s || Object.keys(data.inputs)[0];
            const inputs = data.inputs[season] || Object.values(data.inputs)[0];
            let inputParts = [], batchCost = 0;
            for (const [ing, qty] of Object.entries(inputs)) {
              const p = estimateItemSfl(ing, p2pPrices, null, rates);
              const src = p2pPrices[ing] ? "P2P" : "derived";
              inputParts.push(`${qty}\u00d7 ${ing} (${fNum(p)} ${src})`);
              batchCost += p * qty;
            }
            const totalUnits = Object.values(data.outputs).reduce((sum, q) => sum + q, 0);
            const outputList = Object.entries(data.outputs).map(([n, q]) => `${q}\u00d7 ${n}`).join(" + ");
            const unitCost = totalUnits > 0 ? batchCost / totalUnits : 0;
            const seasonLabel = season.charAt(0).toUpperCase() + season.slice(1);
            return {
              price: unitCost,
              method: `Compost (${seasonLabel})`,
              detail: `${composter}: ${inputParts.join(" + ")} = batch ${fNum(batchCost)} \u00f7 ${totalUnits} units (${outputList}) = ${fNum(unitCost)}/unit`
            };
          }
        }
      }

      return null;
    }

    // Collect all items that have derived prices (not from P2P/NFT API)
    function collectDerivedPriceItems(p2pPrices, rates) {
      const items = new Map(); // name -> { method, category }
      const addItems = (source, category) => {
        if (typeof source === "undefined" || !source) return;
        for (const name of Object.keys(source)) {
          if (!items.has(name)) items.set(name, category);
        }
      };

      // Collect from all pricing tables
      addItems(typeof CRAFTED_INGREDIENT_RECIPES !== "undefined" ? CRAFTED_INGREDIENT_RECIPES : null, "Crafted");
      addItems(typeof RECIPE_INGREDIENTS !== "undefined" ? RECIPE_INGREDIENTS : null, "Food");
      addItems(typeof DOLL_RECIPES !== "undefined" ? DOLL_RECIPES : null, "Dolls");
      addItems(typeof TOOL_COSTS !== "undefined" ? TOOL_COSTS : null, "Tools");
      addItems(typeof FLOWER_SEED_COIN_COSTS !== "undefined" ? FLOWER_SEED_COIN_COSTS : null, "Flower seeds");
      addItems(typeof FLOWER_RECIPES !== "undefined" ? FLOWER_RECIPES : null, "Flowers");
      addItems(typeof TREASURE_SELL_PRICES !== "undefined" ? TREASURE_SELL_PRICES : null, "Treasures");
      addItems(typeof ITEM_XP_VALUES !== "undefined" ? ITEM_XP_VALUES : null, "Fish/XP");
      addItems(typeof GIANT_ITEM_COIN_PRICES !== "undefined" ? GIANT_ITEM_COIN_PRICES : null, "Giants");
      addItems(typeof CRUSTACEAN_RECIPES !== "undefined" ? CRUSTACEAN_RECIPES : null, "Crustaceans");

      // Fish Market recipes
      addItems(typeof FISH_MARKET_RECIPES !== "undefined" ? FISH_MARKET_RECIPES : null, "Fish Market");

      // Compost products
      if (typeof COMPOST_RECIPES !== "undefined") {
        for (const data of Object.values(COMPOST_RECIPES)) {
          for (const name of Object.keys(data.outputs)) {
            if (!items.has(name)) items.set(name, "Compost");
          }
        }
      }

      // Special items
      items.set("Oil", "Resources");
      items.set("Love Charm", "Special");
      items.set("Barn Delight", "Food");
      items.set("Mark", "Special");
      items.set("Acorn", "Pets");
      items.set("Omnifeed", "Feed");

      // Seed items from SEED_COSTS (keyed by crop name, but items appear as "X Seed")
      if (typeof SEED_COSTS !== "undefined") {
        for (const cropName of Object.keys(SEED_COSTS)) {
          const seedName = cropName + " Seed";
          if (!items.has(seedName)) items.set(seedName, "Seeds");
        }
      }

      // Now compute explanations, skip P2P items
      const results = [];
      for (const [name, cat] of items) {
        const ex = explainItemSfl(name, p2pPrices, rates);
        if (ex) results.push({ name, category: cat, ...ex });
      }

      // Sort by category then name
      const catOrder = ["Tools", "Seeds", "Flower seeds", "Flowers", "Food", "Feed", "Crafted", "Dolls", "Fish/XP", "Fish Market", "Compost", "Treasures", "Crustaceans", "Giants", "Pets", "Resources", "Special"];
      results.sort((a, b) => {
        const ca = catOrder.indexOf(a.category), cb = catOrder.indexOf(b.category);
        if (ca !== cb) return (ca === -1 ? 99 : ca) - (cb === -1 ? 99 : cb);
        return a.name.localeCompare(b.name);
      });
      return results;
    }

    async function renderDiff(data) {
      const app = document.getElementById("app");

      let hdr = `<div class="header pixel-panel pixel-font">
        <h1>FARM CHANGELOG</h1>
        <div class="farm-id">Farm #${escHTML(FARM_ID)}</div>
      </div>`;

      hdr += `<div class="under-dev-banner pixel-font" style="background:linear-gradient(180deg,#1a1a2e,#16213e);padding:8px 12px;border:3px solid #000;margin-bottom:16px;text-align:center;font-size:0.5625rem;color:#e94560">
        &#x1F50D; FARM DIFF VIEWER &#x1F50D;
        <div style="margin-top:6px;font-size:0.5rem;color:var(--text-secondary);line-height:1.5">
          SFL values from P2P prices + Betty coins + gem exchange. Crafted items valued by ingredient costs.
        </div>
      </div>`;

      hdr += `<div id="diff-content"><div class="loading-screen pixel-font" style="padding:20px"><div class="loading-text">Loading...</div></div></div>`;
      app.innerHTML = hdr;

      // Fetch with retry
      const fetchRetry = async (url, label, retries = 2) => {
        for (let i = 0; i <= retries; i++) {
          try {
            const resp = await fetch(url);
            if (resp.ok) return { ok: true, data: await resp.json(), label };
            if (resp.status >= 500 && i < retries) { await new Promise(r => setTimeout(r, 1000 * (i + 1))); continue; }
            return { ok: false, label, error: `${resp.status} ${resp.statusText}` };
          } catch (e) {
            if (i < retries) { await new Promise(r => setTimeout(r, 1000 * (i + 1))); continue; }
            return { ok: false, label, error: e.message };
          }
        }
      };

      // Fetch prices (once, needed for SFL valuation)
      let p2pPrices = {};
      let coinsPerSFL = 0;
      let gemsPerSFL = 0;
      let sflToUsd = 0;
      let usdToCzk = 0;
      let sflPerXP = 0;
      const warnings = [];
      const proxyUrl = (u) => `/api/proxy?url=${encodeURIComponent(u)}`;

      const [priceRes, exchangeRes, czkRes] = await Promise.all([
        fetchRetry(proxyUrl("https://sfl.world/api/v1/prices"), "P2P prices"),
        fetchRetry(proxyUrl("https://sfl.world/api/v1.1/exchange"), "Exchange rates"),
        fetchRetry("https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json", "USD/CZK"),
      ]);

      if (priceRes.ok) {
        const raw = priceRes.data?.data?.p2p || priceRes.data?.p2p || {};
        for (const [k, v] of Object.entries(raw)) p2pPrices[k] = parseFloat(v) || 0;
      } else { warnings.push(`P2P prices: ${priceRes.error}`); }

      if (exchangeRes.ok) {
        const ed = exchangeRes.data;
        sflToUsd = ed?.sfl?.usd || 0;
        const betty = computeBettyRate(p2pPrices);
        coinsPerSFL = betty.rate || 320;
        const gemTiers = Object.values(ed?.gems || {});
        const bestGemTier = gemTiers.reduce((best, t) => (!best || (t.gem / t.sfl) > (best.gem / best.sfl)) ? t : best, null);
        gemsPerSFL = bestGemTier ? (bestGemTier.gem / (bestGemTier.sfl * 0.7)) : 0;
      } else { warnings.push(`Exchange rates: ${exchangeRes.error}`); }

      if (czkRes.ok) {
        usdToCzk = czkRes.data?.usd?.czk || 0;
      }

      // Compute SFL per XP for fish/food pricing (from best cooking recipe + boosts)
      try {
        const _sc = calcSkillPointCost(data.farm?.bumpkin, p2pPrices, data.farm);
        sflPerXP = (_sc.bestRecipe && _sc.bestRecipe.boostedXP > 0)
          ? _sc.bestRecipe.cost / _sc.bestRecipe.boostedXP : 0;
      } catch(e) { sflPerXP = 0; }

      // Compute Oil price from farm data (same method as Power page)
      if (!p2pPrices["Oil"]) {
        // Try localStorage cache from Power page (includes all NFT boosts)
        const cachedOil = parseFloat(localStorage.getItem("sfl_oil_price"));
        if (!isNaN(cachedOil) && cachedOil >= 0) {
          p2pPrices["Oil"] = cachedOil;
        } else {
          // Fallback: compute from farm capacity + skills (no NFT boosts)
          try {
            const _cap = detectFarmCapacity(data.farm);
            const _sm = detectStockModifiers(data.farm);
            const _oilYield = applyBoosts("oil", "Oil", _cap, []);
            const _oilCost = calcToolCostPerDay("oil", _cap, { coinsPerSFL }, p2pPrices, _sm);
            if (_oilYield.unitsPerDay > 0 && _oilCost.costPerDay > 0) {
              p2pPrices["Oil"] = _oilCost.costPerDay / _oilYield.unitsPerDay;
            } else if (_oilYield.unitsPerDay > 0) {
              p2pPrices["Oil"] = 0;
            }
          } catch(e) {}
        }
      }

      // Detect current season for Fish Market recipes
      const currentSeason = (data.farm?.season?.season || "").toLowerCase();

      // Detect treasure sell boosts (same as treasury page)
      let treasureBoost = 1;
      if (findCollectible(data.farm, "Treasure Map").length > 0) treasureBoost += 0.2;
      if (getCount(data.farm?.inventory || {}, "Camel") > 0 || findCollectible(data.farm, "Camel").length > 0) treasureBoost += 0.3;

      const noPrices = Object.keys(p2pPrices).length === 0;

      // ── Process a diff object into items + netSfl ──
      function processDiff(diff) {
        let netSfl = 0;
        const items = [];
        for (const [key, rawDelta] of Object.entries(diff)) {
          if (key === "nodes" || key === "_v" || key.startsWith("_h.") || key.startsWith("_c.")) continue;
          const d = typeof rawDelta === "number" ? rawDelta : parseFloat(rawDelta);
          if (isNaN(d) || Math.abs(d) < 0.0001) continue;

          let category = "other";
          let itemName = key;
          let sflValue = 0;

          if (key === "balance") {
            category = "sfl"; itemName = "SFL Balance"; sflValue = d;
          } else if (key === "coins") {
            category = "coins"; itemName = "Coins";
            sflValue = coinsPerSFL > 0 ? d / coinsPerSFL : 0;
          } else if (key === "gems" || key === "inventory.Gem") {
            category = "gems"; itemName = key === "gems" ? "Gems" : "Gem";
            sflValue = gemsPerSFL > 0 ? d / gemsPerSFL : 0;
          } else if (key.startsWith("inventory.")) {
            itemName = key.substring(10); category = "inventory";
            const price = estimateItemSfl(itemName, p2pPrices, null, { coinsPerSFL, sflPerXP, season: currentSeason, treasureBoost, gemsPerSFL });
            sflValue = d * price;
          } else if (key.startsWith("wardrobe.")) {
            itemName = key.substring(9); category = "wardrobe";
          } else if (key.startsWith("stock.")) {
            continue;
          }

          items.push({ key, itemName, category, delta: d, sflValue, hasPrice: sflValue !== 0 || category === "sfl" || category === "coins" || category === "gems" });
          netSfl += sflValue;
        }
        items.sort((a, b) => Math.abs(b.sflValue) - Math.abs(a.sflValue) || a.itemName.localeCompare(b.itemName));
        return { items, netSfl };
      }

      // ── State ──
      let groupMode = localStorage.getItem("sfl_diff_group") || "all";
      let currencyMode = localStorage.getItem("sfl_diff_currency") || "sfl";
      let showZeroPrice = true;
      let selectedIdx = -1;
      let processed = [];
      let loading = false;

      // ── Period label formatters ──
      function periodLabel(time, mode) {
        if (mode === "all") return time.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        if (mode === "hours") return time.toLocaleString([], { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
        if (mode === "days") return time.toLocaleDateString([], { weekday: "short", month: "short", day: "numeric" });
        if (mode === "weeks") {
          const end = new Date(time.getTime() + 6 * 86400000);
          return time.toLocaleDateString([], { month: "short", day: "numeric" }) + " \u2013 " + end.toLocaleDateString([], { month: "short", day: "numeric" });
        }
        if (mode === "months") return time.toLocaleDateString([], { month: "long", year: "numeric" });
        if (mode === "years") return time.getUTCFullYear().toString();
        return time.toLocaleString();
      }

      function getISOWeek(d) {
        const date = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()));
        date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
        const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
        return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
      }

      // ── Fetch data for a given mode ──
      async function fetchData(mode) {
        loading = true;
        renderContent();

        if (mode === "all") {
          const res = await fetchRetry(`/api/farm-history?farm=${FARM_ID}&latest=50`, "Farm history");
          if (!res.ok) {
            loading = false;
            document.getElementById("diff-content").innerHTML = renderGroupSelector() +
              `<div class="pixel-panel pixel-font" style="padding:20px;text-align:center;color:var(--red)">Failed to load: ${escHTML(res.error)}<br><button class="pixel-font" style="margin-top:10px;padding:8px 16px;cursor:pointer" onclick="window._diffSetGroup('all')">Retry</button></div>`;
            return;
          }
          const snapshots = (res.data.snapshots || []).reverse();
          processed = snapshots.map(snap => {
            const rawDiff = snap.diff || {};
            const { items, netSfl } = processDiff(rawDiff);
            return { time: new Date(snap.captured_at), netSfl, items, count: 1, nodes: rawDiff.nodes || null };
          });
        } else {
          const groupMap = { hours: "hour", days: "day", weeks: "week", months: "month", years: "year" };
          const res = await fetchRetry(`/api/farm-diff-agg?farm=${FARM_ID}&group=${groupMap[mode]}`, "Aggregated data");
          if (!res.ok) {
            loading = false;
            document.getElementById("diff-content").innerHTML = renderGroupSelector() +
              `<div class="pixel-panel pixel-font" style="padding:20px;text-align:center;color:var(--red)">Failed to load: ${escHTML(res.error)}<br><button class="pixel-font" style="margin-top:10px;padding:8px 16px;cursor:pointer" onclick="window._diffSetGroup('${escHTML(mode)}')">Retry</button></div>`;
            return;
          }
          processed = (res.data.periods || []).map(p => {
            const rawDiff = p.diff || {};
            const { items, netSfl } = processDiff(rawDiff);
            // Reconstruct node harvests from flat _h.*/_c.* keys (aggregated sums)
            let nodes = rawDiff.nodes || null;
            const hKeys = Object.entries(rawDiff).filter(([k]) => k.startsWith("_h.") || k.startsWith("_c."));
            if (hKeys.length > 0) {
              nodes = nodes || {};
              for (const [k, v] of hKeys) {
                const type = k.substring(3);
                if (!nodes[type]) nodes[type] = {};
                if (k.startsWith("_h.")) nodes[type].harvested = Math.round(v);
                if (k.startsWith("_c.")) nodes[type].cured = Math.round(v);
              }
            }
            return { time: new Date(p.period), netSfl, items, count: p.count, nodes };
          });
        }

        selectedIdx = processed.length > 0 ? processed.length - 1 : -1;
        loading = false;
        renderContent();
      }

      // ── Group selector HTML ──
      function renderGroupSelector() {
        const modes = [
          { id: "all", label: "ALL" },
          { id: "hours", label: "HOURS" },
          { id: "days", label: "DAYS" },
          { id: "weeks", label: "WEEKS" },
          { id: "months", label: "MONTHS" },
          { id: "years", label: "YEARS" },
        ];
        let s = `<div class="diff-group-selector">`;
        for (const m of modes) {
          s += `<button class="diff-group-btn pixel-font${groupMode === m.id ? ' active' : ''}" onclick="window._diffSetGroup('${m.id}')">${m.label}</button>`;
        }
        s += `</div>`;
        return s;
      }

      // ── Main render ──
      function renderCurrencySelector() {
        const modes = [
          { id: "sfl", label: "SFL" },
          { id: "usd", label: "USD" },
          { id: "czk", label: "CZK" },
        ];
        let s = `<div class="diff-group-selector" style="gap:3px">`;
        for (const m of modes) {
          s += `<button class="diff-group-btn pixel-font${currencyMode === m.id ? ' active' : ''}" style="padding:4px 10px;font-size:0.5rem" onclick="window._diffSetCurrency('${m.id}')">${m.label}</button>`;
        }
        s += `</div>`;
        return s;
      }

      function getCurMult() {
        if (currencyMode === "usd") return sflToUsd;
        if (currencyMode === "czk") return sflToUsd * usdToCzk;
        return 1;
      }
      function getCurIcon(size) {
        if (currencyMode === "sfl") return sflIcon(size || "0.85em");
        const sym = currencyMode === "usd" ? "$" : "K\u010d";
        return `<span style="font-size:${size || '0.85em'}">${sym}</span>`;
      }
      function getCurLabel() {
        return currencyMode === "sfl" ? "SFL" : currencyMode === "usd" ? "USD" : "CZK";
      }
      function fmtCur(sflVal, dec) {
        const v = sflVal * getCurMult();
        const d = dec !== undefined ? dec : (currencyMode === "sfl" ? 2 : 2);
        return v.toFixed(d);
      }
      function fmtCurSigned(sflVal, dec) {
        const v = sflVal * getCurMult();
        const d = dec !== undefined ? dec : 2;
        return (v >= 0 ? "+" : "") + v.toFixed(d);
      }

      function renderContent() {
        let out = renderGroupSelector();
        out += renderCurrencySelector();

        if (loading) {
          out += `<div class="loading-screen pixel-font" style="padding:20px"><div class="loading-text">Loading...</div></div>`;
          document.getElementById("diff-content").innerHTML = out;
          return;
        }

        // Warnings
        if (warnings.length > 0) {
          out += `<div class="pixel-panel pixel-font" style="padding:8px 12px;margin-bottom:12px;border-color:var(--red);font-size:0.5rem;color:var(--text-secondary)">
            ${noPrices ? '<span style="color:var(--red)">Price data unavailable</span> \u2014 SFL values will be missing. ' : '<span style="color:var(--yellow)">Partial data</span> \u2014 '}
            ${warnings.map(w => escHTML(w)).join("; ")}
          </div>`;
        }

        if (processed.length === 0) {
          out += `<div class="pixel-panel pixel-font" style="padding:20px;text-align:center;color:var(--text-secondary)">No data found for this period.</div>`;
          document.getElementById("diff-content").innerHTML = out;
          return;
        }

        // Stat cards
        const totalNet = processed.reduce((s, p) => s + p.netSfl, 0);
        const totalGain = processed.reduce((s, p) => s + (p.netSfl > 0 ? p.netSfl : 0), 0);
        const totalLoss = processed.reduce((s, p) => s + (p.netSfl < 0 ? p.netSfl : 0), 0);
        const totalSnapshots = processed.reduce((s, p) => s + p.count, 0);
        const timeSpan = processed.length >= 2
          ? Math.round((processed[processed.length - 1].time - processed[0].time) / 60000)
          : 0;
        const timeStr = timeSpan >= 1440 ? `${(timeSpan / 1440).toFixed(1)}d` : timeSpan >= 60 ? `${(timeSpan / 60).toFixed(1)}h` : `${timeSpan}m`;

        const isGrouped = groupMode !== "all";
        const countLabel = isGrouped ? "PERIODS" : "SNAPSHOTS";
        const countExtra = isGrouped
          ? ` <span style="font-size:0.4375rem;color:var(--text-dim)">(${totalSnapshots} snaps, ${timeStr})</span>`
          : ` <span style="font-size:0.5rem;color:var(--text-dim)">(${timeStr})</span>`;

        const _ci = getCurIcon("0.85em");

        out += `<div class="diff-stat-cards">
          <div class="pixel-panel diff-stat-card">
            <div class="diff-stat-label">NET CHANGE</div>
            <div class="diff-stat-value" style="color:${totalNet >= 0 ? 'var(--green)' : 'var(--red)'}">${fmtCurSigned(totalNet)} ${_ci}</div>
          </div>
          <div class="pixel-panel diff-stat-card">
            <div class="diff-stat-label">GAINS</div>
            <div class="diff-stat-value" style="color:var(--green)">+${fmtCur(totalGain)} ${_ci}</div>
          </div>
          <div class="pixel-panel diff-stat-card">
            <div class="diff-stat-label">LOSSES</div>
            <div class="diff-stat-value" style="color:var(--red)">${fmtCur(totalLoss)} ${_ci}</div>
          </div>
          <div class="pixel-panel diff-stat-card">
            <div class="diff-stat-label">${countLabel}</div>
            <div class="diff-stat-value" style="color:var(--text-primary)">${processed.length}${countExtra}</div>
          </div>
        </div>`;

        // Bar chart helpers
        function shortBarLabel(t, mode) {
          if (mode === "all") return t.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
          if (mode === "hours") { const h = t.getUTCHours(); return (h < 10 ? "0" : "") + h + ":00"; }
          if (mode === "days") return t.getUTCDate() + "/" + (t.getUTCMonth() + 1);
          if (mode === "weeks") return "W" + getISOWeek(t);
          if (mode === "months") return t.toLocaleDateString([], { month: "short" });
          if (mode === "years") return t.getUTCFullYear().toString();
          return "";
        }
        function fmtBarVal(sflV) {
          const v = sflV * getCurMult();
          const a = Math.abs(v);
          if (a < 0.005) return "0";
          const s = v >= 0 ? "+" : "";
          if (a >= 1000) return s + (v / 1000).toFixed(1) + "k";
          if (a >= 100) return s + Math.round(v);
          if (a >= 10) return s + v.toFixed(1);
          return s + v.toFixed(2);
        }

        // Bar chart
        const _cm = getCurMult();
        const maxAbs = Math.max(...processed.map(p => Math.abs(p.netSfl * _cm)), 0.01);
        const barW = processed.length > 120 ? 6 : processed.length > 60 ? 10 : processed.length > 30 ? 14 : 18;
        const singularMode = groupMode === "all" ? "SNAPSHOT" : groupMode.slice(0, -1).toUpperCase();
        const chartLabel = `${getCurLabel()} VALUE CHANGE PER ${singularMode}`;

        out += `<div class="pixel-panel diff-timeline" style="padding:10px 8px">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px;padding:0 6px">
            <span class="pixel-font" style="font-size:0.5625rem;color:var(--text-dim)">${chartLabel}</span>
            <div class="diff-toggle-wrap">
              <label class="diff-toggle"><input type="checkbox" id="diff-zero-toggle" ${showZeroPrice ? 'checked' : ''} onchange="window._diffToggleZero(this.checked)"> Show zero-price items</label>
            </div>
          </div>
          <div class="diff-chart-wrap" style="position:relative">
            <div class="diff-chart">`;

        out += `<div class="diff-zero-line" style="top:50%"></div>`;

        const labelEvery = processed.length > 100 ? 6 : processed.length > 60 ? 4 : processed.length > 30 ? 2 : 1;
        const valEvery = barW >= 14 ? 1 : barW >= 10 ? 2 : barW >= 6 ? 3 : 5;

        for (let i = 0; i < processed.length; i++) {
          const p = processed[i];
          const pct = Math.min(Math.max(Math.abs(p.netSfl * _cm) / maxAbs * 90, 2), 90);
          const sel = i === selectedIdx ? " selected" : "";
          const tLabel = periodLabel(p.time, groupMode);
          const isPositive = p.netSfl >= 0;
          const snapInfo = p.count > 1 ? ` (${p.count} snapshots)` : "";
          const valTxt = (i % valEvery === 0) ? fmtBarVal(p.netSfl) : "";
          const showLbl = (i % labelEvery === 0);
          const lblHtml = showLbl ? `<div class="diff-bar-label">${shortBarLabel(p.time, groupMode)}</div>` : "";
          const negInside = !isPositive && pct > 35;
          const valCls = negInside ? "diff-bar-val inside" : "diff-bar-val";
          const barValHtml = valTxt ? `<span class="${valCls}">${valTxt}</span>` : "";
          const posBar = isPositive ? `<div class="diff-bar positive" style="height:${pct}%;width:${barW - 4}px">${barValHtml}</div>` : "";
          const negBar = !isPositive ? `<div class="diff-bar negative" style="height:${pct}%;width:${barW - 4}px">${barValHtml}</div>` : "";
          out += `<div class="diff-bar-wrap${sel}" style="width:${barW}px" onclick="window._diffSelect(${i})" title="${escHTML(tLabel)}: ${fmtCurSigned(p.netSfl)} ${getCurLabel()}${snapInfo}">
            <div class="diff-bar-top">${posBar}</div>
            <div class="diff-bar-bot">${negBar}</div>
            ${lblHtml}
          </div>`;
        }

        out += `</div></div></div>`;

        // Selected detail panel
        if (selectedIdx >= 0 && selectedIdx < processed.length) {
          const p = processed[selectedIdx];
          const timeFmt = groupMode === "all" ? p.time.toLocaleString() : periodLabel(p.time, groupMode);
          const visibleItems = showZeroPrice ? p.items : p.items.filter(it => it.hasPrice);

          out += `<div class="pixel-panel diff-detail">
            <div class="diff-detail-header">
              <div>
                <div class="diff-detail-time">${escHTML(timeFmt)}</div>
                <div style="font-size:0.5rem;color:var(--text-dim)">${p.items.length} changes${p.count > 1 ? ' \u00b7 ' + p.count + ' snapshots' : ''}${!showZeroPrice && p.items.length !== visibleItems.length ? ` (${p.items.length - visibleItems.length} hidden)` : ''}</div>
              </div>
              <div class="diff-detail-net" style="color:${p.netSfl >= 0 ? 'var(--green)' : 'var(--red)'}">
                ${fmtCurSigned(p.netSfl, 4)} ${getCurIcon("0.85em")}
              </div>
            </div>`;

          // ── Node state summary ──
          if (p.nodes && Object.keys(p.nodes).length > 0) {
            const NC = {
              trees:       { name:"Trees",     res:"Wood",     tool:"Axe" },
              stones:      { name:"Stone",     res:"Stone",    tool:"Pickaxe" },
              iron:        { name:"Iron",      res:"Iron",     tool:"Stone Pickaxe" },
              gold:        { name:"Gold",      res:"Gold",     tool:"Iron Pickaxe" },
              crimstones:  { name:"Crimstone", res:"Crimstone",tool:"Gold Pickaxe" },
              oilReserves: { name:"Oil",       res:"Oil",      tool:"Oil Drill" },
              lavaPits:    { name:"Lava",      res:"Lava Pit", tool:"Lava Pit" },
              crops:       { name:"Crops",     res:"Sunflower",tool:"Sunflower" },
              fruitPatches:{ name:"Fruit",     res:"Apple",    tool:"Apple" },
              flowerBeds:  { name:"Flowers",   res:"Red Pansy",tool:"Red Pansy" },
              greenhouse:  { name:"Greenhouse",res:"Grape",    tool:"Grape" },
              crabTraps:   { name:"Crab Traps",res:"Crab",     tool:"Crab" },
              chickens:    { name:"Chickens",  res:"Chicken",  tool:null, isAnimal: true },
              cows:        { name:"Cows",      res:"Cow",      tool:null, isAnimal: true },
              sheep:       { name:"Sheep",     res:"Sheep",    tool:null, isAnimal: true },
