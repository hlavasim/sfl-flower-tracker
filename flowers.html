    function countNodeTiers(resourceObj) {
      let t1 = 0, t2 = 0, t3 = 0;
      for (const node of Object.values(resourceObj || {})) {
        const m = node.multiplier || 1;
        if (m >= 16) t3++; else if (m >= 4) t2++; else t1++;
      }
      return { physical: t1 + t2 + t3, t1, t2, t3, effective: t1 + t2 * 4 + t3 * 16 };
    }

    async function renderNodes(data) {
      const app = document.getElementById("app");
      const { inventory, farm } = data;

      let html = `<div class="header pixel-panel pixel-font">
        <h1>NODES INVESTMENT ADVISOR</h1>
        <div class="farm-id">Farm #${escHTML(FARM_ID)}</div>
      </div>`;

      html += `<div class="under-dev-banner pixel-font" style="background:linear-gradient(180deg,#3b1768,#2a1050);padding:8px 12px;border:3px solid #000;margin-bottom:16px;text-align:center;font-size: 0.5625rem;color:var(--lily)">
        ⚠️ UNDER DEVELOPMENT ⚠️
        <div style="margin-top:6px;font-size: 0.5rem;color:var(--text-secondary);line-height:1.5">
          ROI calculator for buying new resource nodes (Sunstones) and merging t1→t2→t3.<br>
          Sorted by fastest payback time. Uses your farm's actual boosts for production estimates.
        </div>
      </div>`;

      html += `<div id="nodes-content"><div class="loading-screen pixel-font" style="padding:20px"><div class="loading-text">Calculating investments...</div></div></div>`;
      app.innerHTML = html;

      // ── Fetch farm history for efficiency analysis (fire early, await later) ──
      const historyPromise = (async () => {
        try {
          const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString().slice(0, 10);
          const today = new Date(Date.now() + 86400000).toISOString().slice(0, 10);
          const baseUrl = `/api/farm-history?farm=${FARM_ID}&from=${weekAgo}&to=${today}&limit=1000`;
          const r = await fetch(baseUrl);
          if (!r.ok) return null;
          const data = await r.json();
          let allSnaps = data.snapshots || [];
          if (data.total > 1000 && allSnaps.length >= 1000) {
            try {
              const r2 = await fetch(baseUrl + "&offset=1000");
              if (r2.ok) { const d2 = await r2.json(); allSnaps = allSnaps.concat(d2.snapshots || []); }
            } catch {}
          }
          return allSnaps;
        } catch { return null; }
      })();

      // ── Fetch prices ──
      let p2pPrices = {}, exchangeRates = { coinsPerSFL: 320, gemsPerSFL: 0 };
      let nftData;
      try {
        const proxyFetch = async (url) => {
          try { const r = await fetch(`/api/proxy?url=${encodeURIComponent(url)}`); if (r.ok) return r.json(); } catch {}
          return (await fetch(url)).json();
        };
        const [nftResp, priceResp, rateResp] = await Promise.all([
          proxyFetch("https://sfl.world/api/v1/nfts"),
          proxyFetch("https://sfl.world/api/v1/prices"),
          proxyFetch("https://sfl.world/api/v1.1/exchange").catch(() => null),
        ]);
        nftData = nftResp;
        const priceData = priceResp?.data?.p2p || priceResp?.p2p || {};
        for (const [k, v] of Object.entries(priceData)) p2pPrices[k] = parseFloat(v) || 0;

        const betty = computeBettyRate(p2pPrices);
        if (betty.rate > 0) { exchangeRates.coinsPerSFL = betty.rate; exchangeRates.bettyItem = betty.item; }
        if (rateResp) {
          const coinTiers = Object.values(rateResp?.coins || rateResp?.data?.coins || {});
          const gemTiers = Object.values(rateResp?.gems || rateResp?.data?.gems || {});
          if (!betty.rate && coinTiers.length > 0) {
            const best = coinTiers.reduce((a, b) => (b.coin / b.sfl) > (a.coin / a.sfl) ? b : a);
            exchangeRates.coinsPerSFL = best.coin / best.sfl;
          }
          if (gemTiers.length > 0) {
            const best = gemTiers.reduce((a, b) => (b.gem / (b.sfl * 0.7)) > (a.gem / (a.sfl * 0.7)) ? b : a);
            exchangeRates.gemsPerSFL = best.gem / (best.sfl * 0.7);
          }
        }
      } catch (err) {
        document.getElementById("nodes-content").innerHTML = `<div class="error-screen pixel-panel pixel-font"><p>Failed to load: ${escHTML(err.message)}</p></div>`;
        return;
      }

      // ── Build boost effects (same as power page) ──
      const wardrobe = farm.wardrobe || {};
      const skills = farm.bumpkin?.skills || {};
      const boostItems = [];

      if (nftData) {
        for (const item of (nftData.collectibles || [])) {
          if (!item.have_boost || !item.name || !item.boost_text) continue;
          const has = getCount(inventory, item.name) > 0 || findCollectible(farm, item.name).length > 0;
          if (!has) continue; // only owned boosts matter for production calc
          const effects = parseBoostEffects(item.boost_text, item.name);
          boostItems.push({ name: item.name, has, effects });
        }
        for (const item of (nftData.wearables || [])) {
          if (!item.have_boost || !item.name || !item.boost_text) continue;
          const has = (wardrobe[item.name] || 0) > 0;
          if (!has) continue;
          const effects = parseBoostEffects(item.boost_text, item.name);
          boostItems.push({ name: item.name, has, effects });
        }
      }

      // Add skill boosts
      for (const [skillName, skill] of Object.entries(SKILL_TREE_DATA)) {
        if (skills[skillName] === undefined) continue;
        const boostText = skill.buff + (skill.debuff ? "\n" + skill.debuff : "");
        const effects = parseBoostEffects(boostText);
        if (SKILL_FEED_EFFECTS[skillName]) {
          for (const [cat, value] of Object.entries(SKILL_FEED_EFFECTS[skillName])) {
            effects.push({ type: "feed_reduction", value, cat });
          }
        }
        boostItems.push({ name: skillName, has: true, effects });
      }

      // Flatten owned effects per category
      function getOwnedEffects(catId) {
        const out = [];
        for (const b of boostItems) {
          for (const e of b.effects) {
            if (e.cat === catId) out.push(e);
          }
        }
        return out;
      }

      // ── Farm capacity & stock mods ──
      const capacity = detectFarmCapacity(farm);
      const stockMods = detectStockModifiers(farm);
      const season = (farm.season?.season || "").toLowerCase();
      const savedProducts = getSavedPowerProducts();
      const islandType = (farm.island?.type || "basic").toLowerCase();

      // ── Derive Oil price (same as power page) ──
      const oilEffects = getOwnedEffects("oil");
      const oilBoosted = applyBoosts("oil", "Oil", capacity, oilEffects);
      const oilToolInfo = calcToolCostPerDay("oil", capacity, exchangeRates, p2pPrices, stockMods);
      if (oilBoosted.unitsPerDay > 0 && oilToolInfo.costPerDay > 0) {
        p2pPrices["Oil"] = oilToolInfo.costPerDay / oilBoosted.unitsPerDay;
      } else if (oilBoosted.unitsPerDay > 0) {
        p2pPrices["Oil"] = 0;
      }

      // ── Compute obsidian production cost ──
      const lavaCostMult = getOwnedEffects("obsidian")
        .filter(e => e.type === "lava_cost_reduction")
        .reduce((acc, e) => acc * (1 - e.value), 1);
      const lavaInfo = calcLavaPitCostPerDay(capacity, p2pPrices, season, lavaCostMult);
      const obsResult = applyBoosts("obsidian", "Obsidian", capacity, getOwnedEffects("obsidian"));
      let obsidianCostSfl = p2pPrices["Obsidian"] || 0; // fallback
      if (obsResult.unitsPerDay > 0) {
        obsidianCostSfl = lavaInfo.costPerDay / obsResult.unitsPerDay;
      }
      const sunstoneCostSfl = obsidianCostSfl * 3;

      // Player resources
      const playerObsidian = parseFloat(inventory["Obsidian"]) || 0;
      const playerSunstones = parseFloat(inventory["Sunstone"]) || 0;
      const playerCoins = farm.coins || 0;

      // ── Restock cost per consumed seed/tool (amortized gem cost) ──
      // 1 restock = gemCost gems, refills effectiveStock items.
      // Cost per item consumed = (gemCost / gemsPerSFL) / effectiveStock
      function restockCostPerUnit(seedOrTool, mode) {
        if (exchangeRates.gemsPerSFL <= 0) return 0;
        const gemCost = mode === "seeds" ? RESTOCK_GEM_COSTS.seeds
                      : mode === "tools" ? RESTOCK_GEM_COSTS.tools
                      : RESTOCK_GEM_COSTS.both;
        const stock = getEffectiveStock(seedOrTool, stockMods);
        if (stock <= 0) return 0;
        return (gemCost / exchangeRates.gemsPerSFL) / stock;
      }

      // ── Compute marginal net SFL/day for 1 extra node (single product) ──
      function calcMarginalForProduct(catId, product, farmKey, ownedEffects) {
        const priceProduct = getPriceProduct(catId, product);
        const n = getCapacityCount(catId, capacity);
        const useCap = n > 0 ? capacity : (() => { const c = { ...capacity }; c[farmKey] = 1; return c; })();
        const useN = n > 0 ? n : 1;

        const boosted = applyBoosts(catId, product, useCap, ownedEffects);
        const grossPerNode = unitToSfl(boosted.unitsPerDay, priceProduct, p2pPrices) / useN;

        let costPerNode = 0;

        if (catId === "obsidian") {
          const c = n > 0 ? lavaInfo : calcLavaPitCostPerDay(useCap, p2pPrices, season, lavaCostMult);
          costPerNode = c.costPerDay / useN;
        } else if (["trees", "stone", "iron", "gold", "crimstone", "oil"].includes(catId)) {
          // Tool cost per node
          const c = calcToolCostPerDay(catId, useCap, exchangeRates, p2pPrices, stockMods);
          costPerNode = c.costPerDay / useN;
          // Restock cost: tools consumed per node per day × restock cost per tool
          if (c.toolsPerDay > 0 && !c.freeTool) {
            const toolName = Object.keys(TOOL_TO_CAT).find(t => TOOL_TO_CAT[t] === catId);
            if (toolName) {
              const toolsPerNodePerDay = c.toolsPerDay / useN;
              costPerNode += toolsPerNodePerDay * restockCostPerUnit(toolName, "tools");
            }
          }
        } else if (["crops", "fruits", "greenhouse"].includes(catId)) {
          // Seed cost per node
          const c = calcSeedCostPerDay(catId, product, useCap, exchangeRates, stockMods, ownedEffects, p2pPrices);
          costPerNode = c.costPerDay / useN;
          // Restock cost: seeds consumed per node per day × restock cost per seed
          const seedName = product + " Seed";
          const seedsPerNodePerDay = (c.seedsPerDay || 0) / useN;
          if (seedsPerNodePerDay > 0) {
            costPerNode += seedsPerNodePerDay * restockCostPerUnit(seedName, "seeds");
          }
        }

        return grossPerNode - costPerNode;
      }

      // Product lists per category (for auto-best selection)
      const PRODUCT_LISTS = {
        crops: Object.keys(CROP_GROW_DATA),
        fruits: Object.keys(FRUIT_GROW_DATA),
        greenhouse: Object.keys(GREENHOUSE_GROW_DATA),
        flowers: Object.keys(SEED_DATA),
      };

      // Fixed products for node ROI (hardcoded best choices)
      const NODE_FIXED_PRODUCTS = {
        crops: "Wheat",
      };

      // ── Find best product & marginal net SFL/day for a node type ──
      function getMarginalNetSfl(nodeKey) {
        const np = NODE_PRICES[nodeKey];
        if (!np) return { marginal: 0, product: null };
        const catId = np.catId;
        const ownedEffects = getOwnedEffects(catId);

        // Hardcoded product override
        if (NODE_FIXED_PRODUCTS[catId]) {
          const product = NODE_FIXED_PRODUCTS[catId];
          const m = calcMarginalForProduct(catId, product, np.farmKey, ownedEffects);
          return { marginal: m, product };
        }

        // For categories with multiple products, try all and pick best
        const products = PRODUCT_LISTS[catId];
        if (products && products.length > 1) {
          let bestMarginal = -Infinity, bestProduct = products[0];
          for (const prod of products) {
            const m = calcMarginalForProduct(catId, prod, np.farmKey, ownedEffects);
            if (m > bestMarginal) { bestMarginal = m; bestProduct = prod; }
          }
          return { marginal: bestMarginal, product: bestProduct };
        }

        // Single-product categories
        const product = getDefaultProduct(catId);
        const m = calcMarginalForProduct(catId, product, np.farmKey, ownedEffects);
        return { marginal: m, product };
      }

      // ── Count physical nodes by tier ──
      const FARM_RESOURCE_KEYS = {
        trees: "trees", stones: "stones", iron: "iron", gold: "gold",
        crimstones: "crimstones", oilReserves: "oilReserves", lavaPits: "lavaPits",
        crops: "crops", fruitPatches: "fruitPatches", flowers: "flowers",
      };
      // For crops/fruits/flowers, no multiplier exists — all t1
      function getNodeTiers(nodeKey) {
        const farmObjKey = FARM_RESOURCE_KEYS[nodeKey];
        if (!farmObjKey) return { physical: 0, t1: 0, t2: 0, t3: 0, effective: 0 };
        if (["crops", "fruitPatches", "flowers"].includes(nodeKey)) {
          let objs;
          if (nodeKey === "flowers") objs = farm.flowers?.flowerBeds || {};
          else objs = farm[farmObjKey] || {};
          const n = Object.keys(objs).length;
          return { physical: n, t1: n, t2: 0, t3: 0, effective: n };
        }
        return countNodeTiers(farm[farmObjKey]);
      }

      // ── Base node counts for this island ──
      const baseNodes = BASE_NODE_COUNTS[islandType] || BASE_NODE_COUNTS["basic"];

      // ── Build investment options ──
      const options = [];

      // A. Buy new node (Sunstone purchase)
      for (const [nodeKey, np] of Object.entries(NODE_PRICES)) {
        const tiers = getNodeTiers(nodeKey);
        const baseCount = baseNodes[nodeKey] || 0;
        // Use effective count (t2=4, t3=16) — game prices by effective nodes
        const purchased = Math.max(0, tiers.effective - baseCount);
        const nextSunstoneCost = np.base + purchased * np.increase;
        const costSfl = nextSunstoneCost * sunstoneCostSfl;
        const { marginal, product: bestProduct } = getMarginalNetSfl(nodeKey);
        const roiDays = (marginal > 0 && costSfl > 0) ? costSfl / marginal : Infinity;
        const sunstonesNeeded = nextSunstoneCost;
        const obsNeeded = sunstonesNeeded * 3; // 1 sunstone = 3 obsidian
        const canAfford = playerSunstones >= sunstonesNeeded || playerObsidian >= obsNeeded;

        options.push({
          action: `Buy ${np.label}`,
          type: "buy",
          nodeKey,
          costSfl,
          costDetail: `${nextSunstoneCost} Sunstones`,
          marginal,
          roiDays,
          canAfford,
          need: canAfford ? "" : `Need ${Math.max(0, Math.ceil(obsNeeded - playerObsidian))} more Obsidian`,
          currentNodes: tiers.physical,
          purchased,
          bestProduct,
        });
      }

      // B. Merge t1→t2
      for (const [mergeKey, mc] of Object.entries(MERGE_COSTS)) {
        const tiers = getNodeTiers(mergeKey);
        if (tiers.t1 < 4) continue;
        const np = NODE_PRICES[mergeKey === "stones" ? "stones" : mergeKey];
        if (!np) continue;
        const catId = np.catId;
        const product = savedProducts[catId] || getDefaultProduct(catId);
        const priceProduct = getPriceProduct(catId, product);
        const rKey = catId === "stone" ? "Stone" : catId === "iron" ? "Iron" : catId === "gold" ? "Gold" : "Wood";
        const respawn = RESOURCE_RESPAWN_DATA[rKey];
        if (!respawn) continue;
        const cyclesPerDay = 86400 / respawn.respawnSec;
        const price = p2pPrices[priceProduct] || 0;

        // Merge cost in SFL
        const obsCost = mc.t2.obsidian * obsidianCostSfl;
        const coinCost = mc.t2.coins / exchangeRates.coinsPerSFL;
        const costSfl = obsCost + coinCost;

        // Marginal benefit: 1 merged node gets +0.5 yield/dig/cycle
        // Before: 4 t1 nodes, each giving bonus=0. After: 1 t2 giving bonus=+0.5
        // Net physical nodes: -3. Effective capacity unchanged (4→4). Extra yield = +0.5×cyclesPerDay×price
        const marginal = 0.5 * cyclesPerDay * price;
        const roiDays = (marginal > 0 && costSfl > 0) ? costSfl / marginal : Infinity;

        const hasObs = playerObsidian >= mc.t2.obsidian;
        const hasCoins = playerCoins >= mc.t2.coins;
        const canAfford = hasObs && hasCoins;

        let need = "";
        if (!hasObs) need = `Need ${mc.t2.obsidian - Math.floor(playerObsidian)} Obsidian`;
        else if (!hasCoins) need = `Need ${(mc.t2.coins - playerCoins).toLocaleString()} coins`;

        options.push({
          action: `Merge ${np.label} → t2`,
          type: "merge_t2",
          nodeKey: mergeKey,
          costSfl,
          costDetail: `${mc.t2.obsidian} Obs + ${(mc.t2.coins / 1000).toFixed(0)}k coins`,
          marginal,
          roiDays,
          canAfford,
          need,
          t1Available: tiers.t1,
        });
      }

      // C. Merge t2→t3
      for (const [mergeKey, mc] of Object.entries(MERGE_COSTS)) {
        const tiers = getNodeTiers(mergeKey);
        if (tiers.t2 < 4) continue;
        const np = NODE_PRICES[mergeKey === "stones" ? "stones" : mergeKey];
        if (!np) continue;
        const catId = np.catId;
        const product = savedProducts[catId] || getDefaultProduct(catId);
        const priceProduct = getPriceProduct(catId, product);
        const rKey = catId === "stone" ? "Stone" : catId === "iron" ? "Iron" : catId === "gold" ? "Gold" : "Wood";
        const respawn = RESOURCE_RESPAWN_DATA[rKey];
        if (!respawn) continue;
        const cyclesPerDay = 86400 / respawn.respawnSec;
        const price = p2pPrices[priceProduct] || 0;

        const obsCost = mc.t3.obsidian * obsidianCostSfl;
        const coinCost = mc.t3.coins / exchangeRates.coinsPerSFL;
        const costSfl = obsCost + coinCost;

        // 4×t2 (each +0.5) → 1×t3 (+2.5). Delta = 2.5 - 4×0.5 = +0.5 per cycle
        const marginal = 0.5 * cyclesPerDay * price;
        const roiDays = (marginal > 0 && costSfl > 0) ? costSfl / marginal : Infinity;

        const hasObs = playerObsidian >= mc.t3.obsidian;
        const hasCoins = playerCoins >= mc.t3.coins;
        const canAfford = hasObs && hasCoins;

        let need = "";
        if (!hasObs) need = `Need ${mc.t3.obsidian - Math.floor(playerObsidian)} Obsidian`;
        else if (!hasCoins) need = `Need ${(mc.t3.coins - playerCoins).toLocaleString()} coins`;

        options.push({
          action: `Merge ${np.label} → t3`,
          type: "merge_t3",
          nodeKey: mergeKey,
          costSfl,
          costDetail: `${mc.t3.obsidian} Obs + ${(mc.t3.coins / 1000).toFixed(0)}k coins`,
          marginal,
          roiDays,
          canAfford,
          need,
          t2Available: tiers.t2,
        });
      }

      // ── Compute efficiency from farm history (dig-session approach) ──
      // A "dig" = a snapshot where inventory.{Resource} increased.
      // Consecutive digs within 30min are merged into one session.
      // Efficiency = actual sessions/day vs theoretical sessions/day.
      const efficiencyMap = {};
      let effDataAvailable = false;
      let effSnapCount = 0, effPeriodDays = 0;
      const historySnapshots = await historyPromise;
      if (historySnapshots && historySnapshots.length >= 2) {
        const sorted = [...historySnapshots]
          .filter(s => s.captured_at && s.diff !== null && s.diff !== undefined)
          .sort((a, b) => new Date(a.captured_at) - new Date(b.captured_at));
        const pDays = (new Date(sorted[sorted.length - 1].captured_at) - new Date(sorted[0].captured_at)) / 86400000;
        effSnapCount = sorted.length;
        effPeriodDays = pDays;

        if (pDays > 0.5) {
          effDataAvailable = true;

          for (const [catId, invName] of Object.entries(EFFICIENCY_RESOURCE_MAP)) {
            // 1. Find timestamps where resource increased (= dig events)
            const digTimes = [];
            for (const snap of sorted) {
              const diff = snap.diff || {};
              if ((diff[`inventory.${invName}`] || 0) > 0) {
                digTimes.push(new Date(snap.captured_at).getTime());
              }
            }

            // 2. Merge consecutive digs within 30min into one session
            const sessions = [];
            if (digTimes.length > 0) {
              let sessionStart = digTimes[0];
              let sessionEnd = digTimes[0];
              for (let i = 1; i < digTimes.length; i++) {
                if (digTimes[i] - sessionEnd <= 1800000) { // 30 min
                  sessionEnd = digTimes[i];
                } else {
                  sessions.push(sessionStart);
                  sessionStart = digTimes[i];
                  sessionEnd = digTimes[i];
                }
              }
              sessions.push(sessionStart);
            }

            // 3. Theoretical digs per day (using boosted respawn, not base)
            const product = getDefaultProduct(catId);
            const ownedEff = getOwnedEffects(catId);
            const boosted = applyBoosts(catId, product, capacity, ownedEff);
            const effectiveCycle = boosted.effectiveCycle || 0;
            const theoreticalPerDay = effectiveCycle > 0 ? 86400 / effectiveCycle : 0;

            // 4. Actual digs per day
            const actualPerDay = sessions.length / pDays;

            // 5. Efficiency = actual / theoretical
            let ratio = theoreticalPerDay > 0 ? actualPerDay / theoreticalPerDay : 0;
            if (ratio > 1.5) ratio = 1.5; // cap at 150%

            // 6. Avg gap between sessions (for display)
            let avgGapH = 0;
            if (sessions.length >= 2) {
              let totalGap = 0;
              for (let i = 1; i < sessions.length; i++) totalGap += sessions[i] - sessions[i - 1];
              avgGapH = (totalGap / (sessions.length - 1)) / 3600000;
            }

            efficiencyMap[catId] = {
              ratio,
              sessions: sessions.length,
              theoreticalPerDay,
              actualPerDay,
              avgGapH,
              optimalGapH: effectiveCycle / 3600,
            };
          }
        }
      }

      // Helper: get efficiency ratio for a catId, or null if not available
      function getEffRatio(catId) {
        return efficiencyMap[catId] ? efficiencyMap[catId].ratio : null;
      }

      // Helper: format efficiency as colored percentage
      function fmtEff(catId) {
        const e = efficiencyMap[catId];
        if (!e) return '<span style="color:var(--text-dim)">\u2014</span>';
        const pct = Math.round(e.ratio * 100);
        const color = pct >= 80 ? "var(--green)" : pct >= 40 ? "var(--sunpetal)" : "var(--red)";
        const tip = `${e.sessions} digs \u00b7 avg ${e.avgGapH.toFixed(1)}h (optimal ${e.optimalGapH.toFixed(1)}h)`;
        return `<span style="color:${color};font-weight:bold" title="${tip}">${pct}%</span>`;
      }

      // Helper: get real ROI for a category (efficiency-adjusted)
      function getRealRoi(costSfl, marginal, catId) {
        const eff = getEffRatio(catId);
        if (eff !== null && eff > 0) return costSfl / (marginal * eff);
        return costSfl / marginal; // fallback to theoretical
      }

      // Sort by real ROI days ascending (fastest payback first)
      for (const o of options) {
        const oCatId = NODE_PRICES[o.nodeKey]?.catId;
        o.realRoiDays = (o.marginal > 0 && o.costSfl > 0 && oCatId) ? getRealRoi(o.costSfl, o.marginal, oCatId) : Infinity;
      }
      options.sort((a, b) => a.realRoiDays - b.realRoiDays);

      // ── Greedy purchase plan ──
      // Simulate spending available resources, always picking the best ROI next.
      // After each "purchase", the next node of that type costs more sunstones.
      const plan = [];
      const marginals = {}; // nodeKey → { marginal, product }
      const purchasedSim = {}; // nodeKey → simulated purchased count
      for (const [nodeKey, np] of Object.entries(NODE_PRICES)) {
        marginals[nodeKey] = getMarginalNetSfl(nodeKey);
        const tiers = getNodeTiers(nodeKey);
        const baseCount = baseNodes[nodeKey] || 0;
        purchasedSim[nodeKey] = Math.max(0, tiers.effective - baseCount);
      }

      // Available resources for simulation
      let simObs = playerObsidian;
      let simSunstones = playerSunstones;
      let simCoins = playerCoins;
      let cumCostSfl = 0, cumSflPerDay = 0;

      for (let step = 0; step < 50; step++) { // safety cap
        // For each node type, calc next sunstone cost & real ROI
        let bestKey = null, bestRoi = Infinity, bestCostSun = 0, bestCostSfl = 0, bestMarginal = 0;
        for (const [nodeKey, np] of Object.entries(NODE_PRICES)) {
          const m = marginals[nodeKey].marginal;
          if (m <= 0) continue;
          const nextSun = np.base + purchasedSim[nodeKey] * np.increase;
          const costSfl = nextSun * sunstoneCostSfl;
          const roi = getRealRoi(costSfl, m, np.catId);
          if (roi < bestRoi) {
            // Check if affordable (sunstones or obsidian×3)
            const obsNeeded = nextSun * 3;
            const canBuySun = simSunstones >= nextSun;
            const canBuyObs = simObs >= obsNeeded;
            if (!canBuySun && !canBuyObs) continue;
            bestKey = nodeKey; bestRoi = roi; bestCostSun = nextSun; bestCostSfl = costSfl; bestMarginal = m;
          }
        }
        if (!bestKey || bestRoi === Infinity) break;

        // "Buy" the node
        const obsNeeded = bestCostSun * 3;
        if (simSunstones >= bestCostSun) {
          simSunstones -= bestCostSun;
        } else {
          simObs -= obsNeeded;
        }
        purchasedSim[bestKey]++;
        cumCostSfl += bestCostSfl;
        cumSflPerDay += bestMarginal;

        const np = NODE_PRICES[bestKey];
        plan.push({
          label: np.label,
          product: marginals[bestKey].product,
          catId: np.catId,
          sunstoneCost: bestCostSun,
          costSfl: bestCostSfl,
          marginal: bestMarginal,
          roi: bestRoi,
          cumCost: cumCostSfl,
          cumSflPerDay,
        });
      }

      // Also try merge options (one-shot, not repeated)
      // Merges use obsidian + coins directly, add to plan if they have better ROI
      // than the worst item already in plan
      for (const o of options.filter(o => o.type.startsWith("merge") && o.marginal > 0 && o.canAfford)) {
        const mergeCatId = NODE_PRICES[o.nodeKey]?.catId || null;
        const mergeRoi = (o.marginal > 0 && o.costSfl > 0 && mergeCatId) ? getRealRoi(o.costSfl, o.marginal, mergeCatId) : o.roiDays;
        plan.push({
          label: o.action,
          product: null,
          catId: mergeCatId,
          sunstoneCost: 0,
          costSfl: o.costSfl,
          marginal: o.marginal,
          roi: mergeRoi,
          cumCost: cumCostSfl + o.costSfl,
          cumSflPerDay: cumSflPerDay + o.marginal,
          isMerge: true,
          costDetail: o.costDetail,
        });
        cumCostSfl += o.costSfl;
        cumSflPerDay += o.marginal;
      }

      // Sort plan by ROI
      plan.sort((a, b) => a.roi - b.roi);

      // Recompute cumulative values after sorting
      let runCost = 0, runSfl = 0;
      for (const p of plan) {
        runCost += p.costSfl;
        runSfl += p.marginal;
        p.cumCost = runCost;
        p.cumSflPerDay = runSfl;
      }

      // ── Render ──
      let content = "";

      // ── Summary bar ──
      content += `<div class="summary-bar pixel-panel">
        <div class="summary-stat">
          <div class="label pixel-font">SUNSTONE COST</div>
          <div class="value" style="color:var(--sunpetal);font-size:0.8125rem">${sunstoneCostSfl.toFixed(4)} ${sflIcon("0.75em")}</div>
        </div>
        <div class="summary-stat">
          <div class="label pixel-font">OBSIDIAN</div>
          <div class="value">${Math.floor(playerObsidian)}</div>
        </div>
        <div class="summary-stat">
          <div class="label pixel-font">SUNSTONES</div>
          <div class="value">${Math.floor(playerSunstones)}</div>
        </div>
        <div class="summary-stat">
          <div class="label pixel-font">COINS</div>
          <div class="value">${playerCoins.toLocaleString()}</div>
        </div>
        <div class="summary-stat">
          <div class="label pixel-font">ISLAND</div>
          <div class="value" style="font-size:0.8125rem">${escHTML(islandType.charAt(0).toUpperCase() + islandType.slice(1))}</div>
        </div>
        <div class="summary-stat">
          <div class="label pixel-font">EFFICIENCY</div>

    async function renderBuds(data) {
      const app = document.getElementById("app");

          All ${BUD_COUNT} bud NFTs with boost calculations (hardcoded data).<br>

        </div>
      </div>`;

      html += `<div id="buds-content"><div class="loading-screen pixel-font" style="padding:20px"><div class="loading-text">Loading prices...</div></div></div>`;
      app.innerHTML = html;

      // Fetch P2P prices only (bud data is hardcoded)
      let p2pPrices = {};
      try {
        const resp = await fetch(`/api/proxy?url=${encodeURIComponent("https://sfl.world/api/v1/prices")}`);
        if (resp.ok) {
          const priceResp = await resp.json();
          const priceData = priceResp?.data?.p2p || priceResp?.p2p || {};
          for (const [k, v] of Object.entries(priceData)) p2pPrices[k] = parseFloat(v) || 0;
        }
      } catch {}

      // Check which buds the user owns
      const ownedBudIds = new Set();
      const farmBuds = farm.buds || {};
      for (const [budId] of Object.entries(farmBuds)) ownedBudIds.add(parseInt(budId));

      // Build all bud data from hardcoded encoded strings
      const budRows = [];
      for (let id = 1; id <= BUD_COUNT; id++) {
        const bud = decodeBud(id);
        if (!bud) continue;
        const result = calcBudSflPerDay(bud, capacity, p2pPrices, savedProducts);
        const boostDescs = describeBudBoosts(bud);
        const owned = ownedBudIds.has(id);
        const breakdownDesc = result.breakdown.map(b => {
          const cat = POWER_CATEGORIES[b.catId];
          return `${catIcon(b.catId, "1em")} ${b.sflPerDay.toFixed(4)}`;
        }).join(" · ");
        budRows.push({ id, type: bud.type, stem: bud.stem, aura: bud.aura,
          boostDescs, breakdownDesc, sflPerDay: result.totalSfl, sflPerYear: result.totalSfl * 365, owned });
      }

      // Sort: owned first, then by SFL/day descending
      budRows.sort((a, b) => {
        if (a.owned !== b.owned) return a.owned ? -1 : 1;
        return b.sflPerDay - a.sflPerDay;

      let content = `<div class="pixel-font" style="font-size:0.5625rem;color:var(--text-secondary);margin-bottom:12px">

        </tr>`;
      }

      content += `</tbody></table></div>`;

      document.getElementById("buds-content").innerHTML = content;
    }
